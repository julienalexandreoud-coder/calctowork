async function loadAutopilotData() {
  try {
    const [stratSnap, learnSnap, reportSnap, pipelineSnap, seoSnap, risingSnap] = await Promise.all([
      db.collection('ai_brain').doc('strategy').get(),
      db.collection('ai_brain').doc('learnings').get(),
      db.collection('growth_reports').orderBy('generated_at', 'desc').limit(1).get(),
      db.collection('calc_pipeline').where('status','==','pending').limit(20).get(),
      db.collection('seo_suggestions').where('status','==','pending').limit(10).get(),
      db.collection('rising_page_audits').orderBy('created_at','desc').limit(1).get(),
    ]);

    const strat = stratSnap.exists ? stratSnap.data() : {};
    const learn = learnSnap.exists ? learnSnap.data() : {};

    // Mission progress (use GSC clicks as proxy for users)
    const cutoff7 = new Date(Date.now()-7*86400000).toISOString().slice(0,10);
    const gscSnap = await db.collection('gsc_site_stats').where('date','>=',cutoff7).get();
    let totalClicks = 0; let days = 0;
    gscSnap.forEach(d => { totalClicks += d.data().total_clicks||0; days++; });
    const avgUsersDay = days > 0 ? Math.round(totalClicks / days) : 0;
    const pct = Math.min(Math.round(avgUsersDay / 100), 100);
    const barEl = document.getElementById('ap-mission-bar');
    if (barEl) barEl.style.width = pct + '%';
    const curEl = document.getElementById('ap-current-users');
    if (curEl) curEl.textContent = avgUsersDay > 0 ? `Current: ~${avgUsersDay.toLocaleString()} users/day` : 'Gathering data…';
    const labEl = document.getElementById('ap-progress-label');
    if (labEl) labEl.textContent = `${pct}% of goal — ${(10000-avgUsersDay).toLocaleString()} more users needed`;

    // CMS stats
    const cmsSnap = await db.collection('calc_cms').where('status','==','published').get();
    const statCalcs = document.getElementById('ap-stat-calcs');
    if (statCalcs) statCalcs.textContent = cmsSnap.size;
    const statPipeline = document.getElementById('ap-stat-pipeline');
    if (statPipeline) statPipeline.textContent = pipelineSnap.size;

    // Trajectory chart — 30 days of GSC site stats
    const cutoff30 = new Date(Date.now()-30*86400000).toISOString().slice(0,10);
    const [trajSnap, dailySnap, topPagesSnap] = await Promise.all([
      db.collection('gsc_site_stats').where('date','>=',cutoff30).orderBy('date','asc').get(),
      db.collection('analytics_daily').where('date','>=',cutoff7).get(),
      db.collection('gsc_page_stats').where('date','>=',cutoff7).limit(2000).get(),
    ]);

    // Draw trajectory sparkline
    const trajPoints = [];
    trajSnap.forEach(d => { const dd = d.data(); trajPoints.push({ date: dd.date, clicks: dd.total_clicks||0 }); });
    if (trajPoints.length > 1) {
      const canvas = document.getElementById('ap-traj-canvas');
      if (canvas) {
        canvas.width = canvas.offsetWidth || 400;
        canvas.height = 120;
        const ctx = canvas.getContext('2d');
        const max = Math.max(...trajPoints.map(p=>p.clicks), 1);
        const W = canvas.width; const H = canvas.height;
        const pad = 12;
        // gradient fill
        const grad = ctx.createLinearGradient(0,0,0,H);
        grad.addColorStop(0,'rgba(249,115,22,0.35)');
        grad.addColorStop(1,'rgba(249,115,22,0)');
        ctx.beginPath();
        trajPoints.forEach((p,i) => {
          const x = pad + (i/(trajPoints.length-1))*(W-2*pad);
          const y = H-pad - (p.clicks/max)*(H-2*pad);
          i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        });
        ctx.lineTo(W-pad, H-pad); ctx.lineTo(pad, H-pad);
        ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
        // line
        ctx.beginPath();
        trajPoints.forEach((p,i) => {
          const x = pad + (i/(trajPoints.length-1))*(W-2*pad);
          const y = H-pad - (p.clicks/max)*(H-2*pad);
          i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        });
        ctx.strokeStyle='#f97316'; ctx.lineWidth=2; ctx.stroke();
        // 7-day moving average line
        ctx.beginPath(); ctx.setLineDash([4,3]);
        trajPoints.forEach((p,i) => {
          const window7 = trajPoints.slice(Math.max(0,i-6),i+1);
          const avg = window7.reduce((s,d)=>s+d.clicks,0)/window7.length;
          const x = pad + (i/(trajPoints.length-1))*(W-2*pad);
          const y = H-pad - (avg/max)*(H-2*pad);
          i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        });
        ctx.strokeStyle='rgba(139,92,246,0.7)'; ctx.lineWidth=1.5; ctx.stroke();
        ctx.setLineDash([]);
      }
      // Trend label: compare last 7 vs prior 7
      const last7 = trajPoints.slice(-7).reduce((s,p)=>s+p.clicks,0);
      const prior7 = trajPoints.slice(-14,-7).reduce((s,p)=>s+p.clicks,0);
      const trendEl = document.getElementById('ap-traj-trend');
      if (trendEl && prior7 > 0) {
        const chg = Math.round((last7-prior7)/prior7*100);
        const up = chg >= 0;
        trendEl.innerHTML = `<span style="color:${up?'#22c55e':'#ef4444'};font-weight:700">${up?'▲':'▼'} ${Math.abs(chg)}% vs prev 7d</span>`;
      }
      const startEl = document.getElementById('ap-traj-start');
      const endEl = document.getElementById('ap-traj-end');
      if (startEl) startEl.textContent = trajPoints[0]?.date || '30d ago';
      if (endEl) endEl.textContent = trajPoints[trajPoints.length-1]?.date || 'today';
    } else {
      const empty = document.getElementById('ap-traj-empty');

async function runAutopilotNow() {
  if (!confirm('Run autopilot now? This will process CMS calcs and may take 2–5 minutes.')) return;
  const btn = event.target;
  btn.disabled = true; btn.textContent = '⏳ Running…';
  try {
    const projectId = 'calctowork';
    const r = await fetch(`https://us-central1-${projectId}.cloudfunctions.net/runAutoPilotHttp`, { method: 'POST' });
    const data = await r.json();
    btn.textContent = `✅ Done — ${JSON.stringify(data)}`;
    setTimeout(() => loadAutopilotData(), 2000);
  } catch(e) {
    btn.textContent = '❌ Error — check console';
    btn.disabled = false;
  }
}

async function runContentEnhancer() {
  const slug = document.getElementById('ai-enhance-slug').value.trim();
  const lang = document.getElementById('ai-enhance-lang').value;
  const goal = document.getElementById('ai-enhance-goal').value;
  if (!slug) { alert('Enter a calculator slug first.'); return; }

  const btn = document.getElementById('ai-enhance-btn');
  const out = document.getElementById('ai-enhance-out');
  btn.disabled = true; btn.textContent = '⏳ Working…';
  out.style.display = 'block'; out.textContent = 'Loading calculator data…';

  try {
    const doc = await db.collection('calc_cms').doc(slug).get();
    if (!doc.exists) throw new Error(`Calculator "${slug}" not found in CMS. Import it first.`);
    const data = doc.data();
    const content = (data.langs && data.langs[lang]) || {};
    if (!content.name) throw new Error(`No ${lang} content found for this calculator.`);

    const goalMap = {
      improve: 'Improve the clarity, depth, and usefulness of this content. Make steps more detailed and actionable.',
      seo: 'Rewrite this content to be better optimized for SEO. Improve the meta description, make steps keyword-rich, expand the content naturally.',
      simplify: 'Simplify this content for beginners. Use plain language, avoid jargon, and make steps very easy to follow.',
      expand: 'Expand this content significantly. Add more detailed steps, more common mistakes, and richer explanations.',
    };

    out.textContent = 'Calling AI…';
    const res = await fetch(`${CMS_BASE}/callAI`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: 'You are an expert SEO content writer for a calculator website. Return ONLY valid JSON.',
        messages: [{ role: 'user', content: `${goalMap[goal]}

Calculator: "${content.name}"
Language: ${lang}

Current content:
${JSON.stringify({ desc: content.desc, seo_title: content.seo_title, seo_description: content.seo_description, steps: content.steps, mistakes: content.mistakes, example_label: content.example_label, formula_display: content.formula_display }, null, 2)}

Return improved JSON with the same keys. Keep all keys even if unchanged.` }],
        maxTokens: 2500,
      }),
    });
    const d = await res.json();
    if (!d.text) throw new Error(d.error || 'No response');
    const match = d.text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('Could not parse AI response as JSON');
    lastEnhancedData = { slug, lang, enhanced: JSON.parse(match[0]) };
    out.textContent = JSON.stringify(lastEnhancedData.enhanced, null, 2);

  } catch(e) { out.textContent = '❌ Error: ' + e.message; }
  btn.disabled = false; btn.textContent = '✨ Enhance';
}

async function applyEnhancement() {
  if (!lastEnhancedData) return;
  const { slug, lang, enhanced } = lastEnhancedData;
  try {
    const doc = await db.collection('calc_cms').doc(slug).get();
    if (!doc.exists) throw new Error('Calculator not found');
    const data = doc.data();
    const existing = (data.langs && data.langs[lang]) || {};
    const merged = { ...existing, ...enhanced };
    await db.collection('calc_cms').doc(slug).update({ [`langs.${lang}`]: merged, updated_at: firebase.firestore.FieldValue.serverTimestamp() });
    alert(`✅ Applied to "${slug}" (${lang}). Re-publish and deploy to make it live.`);
    document.getElementById('ai-enhance-actions').style.display = 'none';
    document.getElementById('ai-enhance-out').style.display = 'none';
    lastEnhancedData = null;
  } catch(e) { alert('Failed: ' + e.message); }
}

async function runBulkTranslate() {
  const lang = document.getElementById('ai-bulk-lang').value;
  const btn = document.getElementById('ai-bulk-btn');
  const progress = document.getElementById('ai-bulk-progress');
  const bar = document.getElementById('ai-bulk-bar');
  const status = document.getElementById('ai-bulk-status');

  btn.disabled = true; progress.style.display = 'block';

  try {
    const snap = await db.collection('calc_cms').get();
    const toTranslate = snap.docs.filter(d => {
      const data = d.data();
      return data.langs && data.langs.en && data.langs.en.name && !(data.langs[lang] && data.langs[lang].name);
    });

    if (toTranslate.length === 0) { status.textContent = `✅ All CMS calculators already have ${lang} content.`; btn.disabled = false; return; }

    let done = 0;
    for (const docSnap of toTranslate) {
      const slug = docSnap.id;
      status.textContent = `Translating ${slug} (${done+1}/${toTranslate.length})…`;
      try {
        const res = await fetch(`${CMS_BASE}/translateCalc`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ slug, targetLang: lang }),
        });
        const d = await res.json();
        if (d.translated) {
          await db.collection('calc_cms').doc(slug).update({ [`langs.${lang}`]: d.translated, updated_at: firebase.firestore.FieldValue.serverTimestamp() });
        }
      } catch(e) { status.textContent += ` (failed: ${e.message})`; }
      done++;
      bar.style.width = Math.round(done / toTranslate.length * 100) + '%';
      await new Promise(r => setTimeout(r, 800)); // pace requests
    }
    status.textContent = `✅ Translated ${done} calculators into ${lang}.`;
  } catch(e) { status.textContent = '❌ ' + e.message; }
  btn.disabled = false;
}

function applyGeneratedCalc(calc) {
  cmsEditing = {
    slug: calc.slug || '',
    category: calc.category || 'matematicas',
    standard: calc.standard || '',
    trust_note: calc.trust_note || '',
    related: '',
    inputs: (calc.inputs || []).map(inp => ({
      id: inp.id,
      min: inp.min ?? 0,
      max: inp.max ?? 100000,
      step: inp.step ?? 0.01,
      default: inp.default ?? 0,
      unit: inp.unit || '',
      unit_options: inp.unit_options || (inp.unit ? [inp.unit] : []),
      unit_category: inp.unit_category || '',
    })),
    outputs: (calc.outputs || []).map(o => ({ id: o.id, unit: o.unit || '', highlight: !!o.highlight })),
    formula: calc.formula || 'return {};',
    example_inputs: calc.example_inputs || {},
    comparison_presets: [],
    langs: {},
  };
  // Apply English content
  const en = (calc.langs && calc.langs.en) || {};
  cmsEditing.langs.en = {
    name: en.name || '',
    desc: en.desc || '',
    seo_title: en.seo_title || '',
    seo_description: en.seo_description || '',
    formula_display: en.formula_display || '',
    example_label: en.example_label || '',
    result_context: en.result_context || '',
    steps: en.steps || [],
    mistakes: en.mistakes || [],
    inputs_labels: {},
    outputs_labels: {},
    range_hints: {},
  };
  // Apply input/output labels from generated calc
  (calc.inputs || []).forEach(inp => { if (inp.label_en) cmsEditing.langs.en.inputs_labels[inp.id] = inp.label_en; });
  (calc.outputs || []).forEach(out => { if (out.label_en) cmsEditing.langs.en.outputs_labels[out.id] = out.label_en; });

  document.getElementById('cms-list-view').style.display = 'none';
  document.getElementById('cms-editor-view').style.display = '';
  cmsEditorSection = 1;
  cmsLastSaved = null;
  renderCMSEditor();

  // Auto-test formula after render
  setTimeout(() => { if (cmsEditing.formula) cmsTestFormula(); }, 300);
}

async function aiGenerateFormula() {
  if (!(cmsEditing.inputs || []).length) { alert('Add input fields first (Section 2).'); return; }
  const name = cmsEditing.langs?.en?.name || cmsEditing.slug;
  const btn = event.target;
  btn.textContent = '⏳'; btn.disabled = true;
  try {
    const inputDefs = (cmsEditing.inputs || []).map(i => `inputs.${i.id} (${i.unit || 'no unit'}, default ${i.default})`).join(', ');
    const outputDefs = (cmsEditing.outputs || []).map(o => o.id).join(', ') || 'result';
    const res = await fetch(`${CMS_BASE}/callAI`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: 'You are an expert at writing JavaScript calculator formulas. Return ONLY the JavaScript code, no markdown.',
        messages: [{ role: 'user', content: `Write a JavaScript formula function body for: "${name}"
Available input variables: ${inputDefs}
Expected output IDs: ${outputDefs}
${cmsEditing.standard ? 'Engineering standard: ' + cmsEditing.standard : ''}

Rules:
- Use parseFloat(inputs.x)||0 to safely read inputs
- Return object: return { ${outputDefs} }
- Be mathematically correct
- Add brief comments for complex steps
- No function wrapper, just the body (var declarations + return statement)` }],
        maxTokens: 600,
      }),
    });
    const d = await res.json();
    if (!d.text) throw new Error(d.error || 'No response');
    // Strip markdown code blocks if present
    const code = d.text.replace(/```javascript?\n?/g,'').replace(/```\n?/g,'').trim();
    cmsEditing.formula = code;
    document.getElementById('cms-section-body').innerHTML = renderCMSSection(3);
    setTimeout(() => cmsTestFormula(), 200);
    cmsScheduleAutoSave();
  } catch(e) { alert('AI error: ' + e.message); }
  btn.textContent = '🤖 Generate Formula'; btn.disabled = false;
}

async function aiExplainFormula() {
  if (!cmsEditing.formula || cmsEditing.formula === 'return {};') { alert('Write a formula first.'); return; }
  const btn = event.target;
  btn.textContent = '⏳'; btn.disabled = true;
  try {
    const res = await fetch(`${CMS_BASE}/callAI`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [{ role: 'user', content: `Explain this calculator formula in plain English. What does it calculate, what are the key steps, and are there any issues?\n\nFormula:\n${cmsEditing.formula}` }],
        maxTokens: 400,
      }),
    });
    const d = await res.json();
    const el = document.getElementById('cms-formula-result');
    if (el) el.innerHTML = `<div style="background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:6px;padding:.5rem .75rem;font-size:.78rem;line-height:1.5;margin-top:.4rem;white-space:pre-wrap">${(d.text||d.error||'No response').replace(/</g,'&lt;')}</div>`;
  } catch(e) { alert('AI error: ' + e.message); }
  btn.textContent = '💡 Explain'; btn.disabled = false;
}

async function aiGenerateContent() {
  const name = cmsEditing.langs?.en?.name;
  if (!name) { alert('Set the calculator name first (Section 1).'); return; }
  const btn = event.target;
  btn.textContent = '⏳ Generating…'; btn.disabled = true;
  try {
    const ctx = aiPromptContext();
    const formulaDisplay = cmsEditing.langs?.en?.formula_display || '';
    const res = await fetch(`${CMS_BASE}/callAI`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: 'You are an expert SEO content writer for a calculator website. Return ONLY valid JSON.',
        messages: [{ role: 'user', content: `Generate complete English content for this calculator page. Return JSON:
{
  "desc": "one sentence description",
  "seo_title": "Calculator Name — CalcToWork (max 60 chars)",
  "seo_description": "compelling meta description max 155 chars",
  "formula_display": "human readable equation e.g. Area = Length × Width",
  "example_label": "2 sentence worked example with real numbers",
  "result_context": "The result is {output_id} unit (use actual output id)",
  "steps": ["Step 1 (specific, actionable)", "Step 2", "Step 3", "Step 4"],
  "mistakes": ["Common mistake 1", "Common mistake 2"]
}

${ctx}
${formulaDisplay ? 'Formula: ' + formulaDisplay : ''}` }],
        maxTokens: 1000,
      }),
    });
    const d = await res.json();
    const match = d.text && d.text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error(d.error || 'No JSON in response');
    const content = JSON.parse(match[0]);
    if (!cmsEditing.langs) cmsEditing.langs = {};
    if (!cmsEditing.langs.en) cmsEditing.langs.en = {};
    Object.assign(cmsEditing.langs.en, content);
    document.getElementById('cms-section-body').innerHTML = renderCMSSection(4);
    cmsScheduleAutoSave();
  } catch(e) { alert('AI error: ' + e.message); }
  btn.textContent = '🤖 Generate All Content'; btn.disabled = false;
}

let activityUnsub = null;
function startActivityFeed(containerId) {
  if (activityUnsub) { activityUnsub(); activityUnsub = null; }
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = '<div style="color:var(--muted);font-size:.8rem;padding:.5rem">Connecting…</div>';
  try {
    activityUnsub = db.collection('analytics_events')
      .orderBy('created_at', 'desc').limit(40)
      .onSnapshot(snap => {
        if (!document.getElementById(containerId)) { activityUnsub && activityUnsub(); return; }
        const rows = snap.docs.map(d => {
          const e = d.data();
          const t = e.created_at ? new Date(e.created_at.seconds * 1000) : null;
          const ago = t ? timeAgo(t) : '—';
          const page = (e.page_url || '').replace('https://calcto.work','').replace(/\/$/,'') || '/';
          const icons = { page_view:'👁', calculation_completed:'✅', input_changed:'✏️', copy_results:'📋', share_clicked:'🔗', scroll_depth:'📜', session_end:'🚪' };
          const icon = icons[e.event_name] || '•';
          const device = e.screen_width >= 1024 ? '🖥' : e.screen_width >= 600 ? '📱' : e.screen_width > 0 ? '📱' : '';
          return `<div style="display:grid;grid-template-columns:20px 1fr auto;gap:.4rem;align-items:center;padding:.35rem 0;border-bottom:1px solid var(--border)">
            <span style="font-size:.85rem">${icon}</span>
            <div>
              <div style="font-size:.78rem;font-weight:500;color:var(--text)">${(e.event_name||'').replace(/_/g,' ')}</div>
              <div style="font-size:.7rem;color:var(--muted)">${page}${e.lang?' · '+e.lang:''} ${device}</div>
            </div>
            <span style="font-size:.68rem;color:var(--muted);white-space:nowrap">${ago}</span>
          </div>`;
        });
        el.innerHTML = rows.join('') || '<div style="color:var(--muted);font-size:.8rem">No events yet.</div>';
      }, err => {
        if (document.getElementById(containerId))
          el.innerHTML = '<div style="color:var(--muted);font-size:.78rem">Feed unavailable.</div>';
      });
  } catch(e) {
    el.innerHTML = '<div style="color:var(--muted);font-size:.78rem">Feed error.</div>';
  }
}
function timeAgo(date) {
  const s = Math.floor((Date.now() - date) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

function cmsSectionComplete(n) {
  if (!cmsEditing) return false;
  if (n === 1) return !!(cmsEditing.slug && cmsEditing.langs?.en?.name);
  if (n === 2) return (cmsEditing.inputs||[]).length > 0;
  if (n === 3) return !!(cmsEditing.formula && (cmsEditing.outputs||[]).length > 0);
  if (n === 4) return !!(cmsEditing.langs?.en?.desc && (cmsEditing.langs?.en?.steps||[]).filter(Boolean).length > 0);
  if (n === 5) return CMS_LANGS.some(l => l!=='en' && cmsEditing.langs?.[l]?.name);
  return false;
}

async function importStaticCalc(id, slug) {
  // Check if already in CMS
  const existing = cmsCalcs.find(c => c.slug === slug || c.staticId === id);
  if (existing) {
    openCMSEditor(existing.slug);
    return;
  }

  const ev = document.getElementById('cms-editor-view');
  const lv = document.getElementById('cms-list-view');
  lv.style.display = 'none';
  ev.style.display = '';
  ev.innerHTML = '<div class="loading" style="padding:3rem;text-align:center"><span class="spinner"></span> Loading calculator data…</div>';

  try {
    // Try to get calc data from the Cloud Function
    const res = await fetch(`${CMS_BASE}/getCalcData?id=${encodeURIComponent(id)}`);
    if (!res.ok) throw new Error('API error ' + res.status);
    const data = await res.json();

    cmsEditing = {
      slug: data.slug || slug,
      staticId: id,
      source: 'static',
      category: data.category || data.block_slug || 'matematicas',
      standard: data.standard || '',
      trust_note: data.trust_note || '',
      related: (data.related || []).join(', '),
      inputs: (data.inputs || []).map(inp => ({
        id: inp.id,
        min: inp.min ?? 0,
        max: inp.max ?? 1000000,
        step: inp.step ?? 1,
        default: inp.default ?? 0,
        unit: inp.unit || '',
        unit_options: inp.unit_options || (inp.unit ? [inp.unit] : []),
        unit_category: inp.unit_category || '',
      })),
      outputs: (data.outputs || []).map(o => ({ id: o.id, unit: o.unit || '', highlight: o.highlight || false })),
      formula: data.formula || 'return {};',
      example_inputs: data.example_inputs || {},
      comparison_presets: (data.comparison_presets || []).map(p => ({
        label: Object.values(p).join('×'),
        inputs: p,
      })),
      langs: {},
    };

    // Load language content
    const langs = data.langs || {};
    for (const lang of CMS_LANGS) {
      const ld = langs[lang];
      if (!ld) continue;
      cmsEditing.langs[lang] = {
        name: ld.name || '',
        desc: ld.desc || ld.description || '',
        seo_title: ld.seo_title || '',
        seo_description: ld.seo_description || '',
        example_label: ld.example_label || '',
        result_context: ld.result_context || '',
        formula_display: ld.formula_display || '',
        steps: ld.steps || [],
        mistakes: ld.mistakes || [],
        inputs_labels: ld.inputs || ld.inputs_labels || {},
        outputs_labels: ld.outputs || ld.outputs_labels || {},
        range_hints: ld.range_hints || {},
      };
    }
  } catch(e) {
    // Fallback: use index data only
    const entry = staticCalcsIndex.find(c => c.id === id) || { id, slug, names:{}, slugs:{}, category:'matematicas' };
    cmsEditing = {
      slug: entry.slug || slug,
      staticId: id,
      source: 'static',
      category: entry.category || 'matematicas',
      standard: '', trust_note: '', related: '',
      inputs: [], outputs: [],
      formula: 'return {};',
      example_inputs: {}, comparison_presets: [],
      langs: {},
    };
    for (const lang of CMS_LANGS) {
      if (entry.names?.[lang]) {
        cmsEditing.langs[lang] = { name: entry.names[lang], desc:'', seo_title:'', seo_description:'', steps:[], mistakes:[], inputs_labels:{}, outputs_labels:{}, range_hints:{} };
      }
    }
    // Show warning if fallback
    console.warn('importStaticCalc fallback:', e.message);
  }

  cmsEditorSection = 1;
  renderCMSEditor();

  // Show import notice
  setTimeout(() => {
    const notice = document.getElementById('cms-import-notice');
    if (notice) notice.style.display = '';
  }, 100);
}

    example_inputs: {}, comparison_presets: [],
    langs: { en: { name:'', desc:'', seo_title:'', seo_description:'', inputs_labels:{}, outputs_labels:{}, example_label:'', result_context:'', formula_display:'', steps:['','',''], mistakes:[''], range_hints:{} } },

}

async function openCMSEditor(slug) {
  document.getElementById('cms-list-view').style.display = 'none';
  const ev = document.getElementById('cms-editor-view');
  ev.style.display = '';

  if (slug) {
    ev.innerHTML = '<div class="loading" style="padding:3rem;text-align:center"><span class="spinner"></span> Loading…</div>';
    try {
      const doc = await db.collection('calc_cms').doc(slug).get();
      cmsEditing = doc.exists ? { slug: doc.id, ...doc.data() } : newBlankCalc();
      if (!cmsEditing.langs) cmsEditing.langs = {};
      // Normalize unit_options
      (cmsEditing.inputs || []).forEach(inp => {
        if (typeof inp.unit_options === 'string') inp.unit_options = inp.unit_options.split(',').map(s=>s.trim()).filter(Boolean);
      });
    } catch(e) { cmsEditing = newBlankCalc(); }
  } else {
    cmsEditing = newBlankCalc();
  }
  cmsEditorSection = 1;
  cmsLastSaved = null;
  renderCMSEditor();
}

// ── SYNC ──
function cmsSync(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const val = el.value;
  if (id === 'cms-slug') {
    cmsEditing.slug = val.toLowerCase().replace(/[^a-z0-9-]/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
    el.value = cmsEditing.slug;
  } else if (id === 'cms-category') cmsEditing.category = val;
  else if (id === 'cms-standard') cmsEditing.standard = val;
  else if (id === 'cms-trust') cmsEditing.trust_note = val;
  else if (id === 'cms-related') cmsEditing.related = val;
  else if (id === 'cms-formula') cmsEditing.formula = val;
  else if (id.startsWith('cms-inp-')) cmsSync_input(id, val);
  else if (id.startsWith('cms-out-')) cmsSync_output(id, val);
  else if (id.startsWith('cms-lang-')) cmsSync_lang(id, val);
  else if (id.startsWith('cms-step-') || id.startsWith('cms-mistake-')) cmsSync_contentArr(id, val);
  else if (id.startsWith('cms-hint-')) cmsSync_hint(id, val);
  else if (id.startsWith('cms-prs-')) cmsSync_preset(id, val);

  // Update header title live
  if (id === 'cms-lang-en-name') {
    const titleEl = document.querySelector('#cms-editor-view [style*="font-weight:700"]');
    if (titleEl) titleEl.textContent = val || 'New Calculator';
  }
  // Live char counters
  if (id === 'cms-lang-en-seo-title' || id.endsWith('-seo-title')) {
    const cnt = document.getElementById(id + '-cnt');
    if (cnt) cnt.textContent = val.length + '/60';
    if (cnt) cnt.style.color = val.length > 60 ? 'var(--danger)' : 'var(--muted)';
  }
  if (id === 'cms-lang-en-seo-desc' || id.endsWith('-seo-desc')) {
    const cnt = document.getElementById(id + '-cnt');
    if (cnt) cnt.textContent = val.length + '/155';
    if (cnt) cnt.style.color = val.length > 155 ? 'var(--danger)' : 'var(--muted)';
  }
}
function cmsSync_input(id, val) {
  const parts = id.split('-');
  const idx = parseInt(parts[2]);
  const field = parts.slice(3).join('-');
  if (!cmsEditing.inputs[idx]) return;
  if (['min','max','step','default'].includes(field)) cmsEditing.inputs[idx][field] = parseFloat(val) ?? 0;
  else if (field === 'unit_options') cmsEditing.inputs[idx].unit_options = val.split(',').map(s=>s.trim()).filter(Boolean);
  else cmsEditing.inputs[idx][field] = val;
}
function cmsSync_output(id, val) {
  const parts = id.split('-'); const idx = parseInt(parts[2]); const field = parts[3];
  if (!cmsEditing.outputs[idx]) return;
  if (field === 'highlight') cmsEditing.outputs[idx].highlight = document.getElementById(id).checked;
  else cmsEditing.outputs[idx][field] = val;
}
function cmsSync_lang(id, val) {
  const inner = id.replace('cms-lang-','');
  const firstDash = inner.indexOf('-');
  const lang = inner.slice(0, firstDash);
  const field = inner.slice(firstDash + 1);
  if (!cmsEditing.langs) cmsEditing.langs = {};
  if (!cmsEditing.langs[lang]) cmsEditing.langs[lang] = {};
  const L = cmsEditing.langs[lang];
  if (field === 'name') L.name = val;
  else if (field === 'desc') L.desc = val;
  else if (field === 'seo-title') L.seo_title = val;
  else if (field === 'seo-desc') L.seo_description = val;
  else if (field === 'example') L.example_label = val;
  else if (field === 'result-ctx') L.result_context = val;
  else if (field === 'formula-display') L.formula_display = val;
}
function cmsSync_contentArr(id, val) {
  const parts = id.split('-');
  if (id.startsWith('cms-step-')) {
    const idx = parseInt(parts[2]); const l = parts[3] || 'en';
    if (!cmsEditing.langs[l]) cmsEditing.langs[l] = {};
    if (!cmsEditing.langs[l].steps) cmsEditing.langs[l].steps = [];
    cmsEditing.langs[l].steps[idx] = val;
  } else if (id.startsWith('cms-mistake-')) {
    const idx = parseInt(parts[2]); const l = parts[3] || 'en';
    if (!cmsEditing.langs[l]) cmsEditing.langs[l] = {};
    if (!cmsEditing.langs[l].mistakes) cmsEditing.langs[l].mistakes = [];
    cmsEditing.langs[l].mistakes[idx] = val;
  }
}
function cmsSync_hint(id, val) {
  const parts = id.split('-');
  const lang = parts[2]; const inputId = parts.slice(3).join('-');
  if (!cmsEditing.langs[lang]) cmsEditing.langs[lang] = {};
  if (!cmsEditing.langs[lang].range_hints) cmsEditing.langs[lang].range_hints = {};
  cmsEditing.langs[lang].range_hints[inputId] = val;
}
function cmsSync_preset(id, val) {
  const parts = id.split('-');
  const idx = parseInt(parts[2]);
  if (!cmsEditing.comparison_presets[idx]) cmsEditing.comparison_presets[idx] = { label:'', inputs:{} };
  if (parts[3] === 'label') cmsEditing.comparison_presets[idx].label = val;
  else if (parts[3] === 'inp') {
    const inputId = parts.slice(4).join('-');
    cmsEditing.comparison_presets[idx].inputs[inputId] = parseFloat(val)||val;
  }
}

            ${CMS_LANGS.filter(ll=>ll!=='en').map(ll=>`<div>
              <div style="font-size:.65rem;color:var(--muted);margin-bottom:.15rem">${CMS_LANG_NAMES[ll]||ll}</div>
              <input value="${((cmsEditing.langs?.[ll]?.outputs_labels?.[o.id])||'').replace(/"/g,'&quot;')}"
                placeholder="${enOutLabel||o.id}"
                oninput="if(!cmsEditing.langs['${ll}'])cmsEditing.langs['${ll}']={};if(!cmsEditing.langs['${ll}'].outputs_labels)cmsEditing.langs['${ll}'].outputs_labels={};cmsEditing.langs['${ll}'].outputs_labels['${o.id}']=this.value;cmsScheduleAutoSave()"
                style="width:100%;padding:.3rem .4rem;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:.75rem">
            </div>`).join('')}

        </div>

      ${outputs.length===0?'<div style="color:var(--muted);font-size:.8rem;padding:.5rem">No outputs yet.</div>':''}
    </div>

    <div style="margin-bottom:1.25rem">

      </div>

      </div>`).join('')}

}

function cmsAddOutput() {
  if (!cmsEditing.outputs) cmsEditing.outputs = [];
  cmsEditing.outputs.push({ id:'out'+cmsEditing.outputs.length, unit:'', highlight:false });
  document.getElementById('cms-section-body').innerHTML = renderCMSSection(3);
}
function cmsRemoveOutput(idx) {
  cmsEditing.outputs.splice(idx, 1);
  document.getElementById('cms-section-body').innerHTML = renderCMSSection(3);
}
function cmsTestFormula() {
  const el = document.getElementById('cms-formula-result');
  try {
    const fn = new Function('inputs', cmsEditing.formula || 'return {}');
    const result = fn({ ...(cmsEditing.example_inputs || {}) });
    if (result && result.error) {
      el.innerHTML = `<span style="color:var(--warning)">⚠️ Returned error flag: ${JSON.stringify(result)}</span>`;
    } else {
      el.innerHTML = `<span style="color:var(--success)">✓ ${JSON.stringify(result)}</span>`;
    }
  } catch(e) {
    el.innerHTML = `<span style="color:var(--danger)">✗ ${e.message}</span>`;
  }
}

  const otherLangs = CMS_LANGS.filter(l => l !== 'en');

// ── LONG CONTENT HELPERS ──
function toggleLongContentPreview(lang) {
  const preview = document.getElementById('lc-preview-' + lang);
  const textarea = document.getElementById('cms-long-content-' + lang);
  const btn = document.getElementById('lc-preview-btn-' + lang);
  if (!preview) return;
  const showing = preview.style.display !== 'none';
  if (showing) {
    preview.style.display = 'none';
    if (textarea) textarea.style.display = '';
    if (btn) btn.textContent = '👁 Preview';
  } else {
    const content = textarea ? textarea.value : (cmsEditing.langs?.[lang]?.long_content || '');
    preview.innerHTML = content;
    preview.style.display = '';
    if (textarea) textarea.style.display = 'none';
    if (btn) btn.textContent = '✏️ Edit HTML';
  }
}

async function aiGenerateLongContent(lang) {
  const status = document.getElementById('cms-lc-' + lang + '-status');
  if (status) status.innerHTML = '<span class="spinner" style="display:inline-block;width:12px;height:12px;border-width:2px"></span> Generating…';
  try {
    const tmpSlug = cmsEditing.slug || ('cms-tmp-' + Date.now());
    await db.collection('calc_cms').doc(tmpSlug).set({ ...cmsEditing, slug: tmpSlug }, { merge: true });
    const res = await fetch(`${CMS_BASE}/generateLongContent`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug: tmpSlug, lang }),
    });
    const data = await res.json();
    if (data.error) { if(status) status.innerHTML = `<span style="color:var(--danger)">Error: ${data.error}</span>`; return; }
    if (!cmsEditing.langs) cmsEditing.langs = {};
    if (!cmsEditing.langs[lang]) cmsEditing.langs[lang] = {};
    if (data.long_content) cmsEditing.langs[lang].long_content = data.long_content;
    if (data.faq) cmsEditing.langs[lang].faq = data.faq;
    if (status) status.innerHTML = '<span style="color:var(--success)">✓ Generated — review and edit below.</span>';
    document.getElementById('cms-section-body').innerHTML = renderCMSSection(cmsEditorSection);
    cmsScheduleAutoSave();
  } catch(e) {
    if (status) status.innerHTML = `<span style="color:var(--danger)">Failed: ${e.message}</span>`;
  }
}

  const status = document.getElementById('cms-lc-' + lang + '-status');

// ── AUTO-TRANSLATE ──
async function cmsTranslateAllLanguages() {
  if (!cmsEditing.langs?.en?.name) { alert('Fill English content first (Content tab).'); return; }
  const statusEl = document.getElementById('basic-translate-status');
  const otherLangs = CMS_LANGS.filter(l => l !== 'en');
  const tmpSlug = cmsEditing.slug || ('cms-tmp-' + Date.now());
  try {
    await db.collection('calc_cms').doc(tmpSlug).set({ ...cmsEditing, slug: tmpSlug }, { merge: true });
  } catch(e) { if(statusEl) statusEl.textContent = 'Save failed: ' + e.message; return; }

  let done = 0;
  for (const lang of otherLangs) {
    if(statusEl) statusEl.innerHTML = `<span class="spinner" style="display:inline-block;width:12px;height:12px;border-width:2px"></span> Translating ${CMS_LANG_NAMES[lang]||lang}…`;
    try {
      const res = await fetch(`${CMS_BASE}/translateCalc`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ slug: tmpSlug, targetLang: lang }),
      });
      const data = await res.json();
      if (!data.error) {
        if (!cmsEditing.langs) cmsEditing.langs = {};
        cmsEditing.langs[lang] = { ...(cmsEditing.langs[lang] || {}), ...data.translated };
        done++;
      }
    } catch(e) { /* continue with next lang */ }
  }
  cmsScheduleAutoSave();
  if(statusEl) statusEl.innerHTML = `<span style="color:var(--success)">✓ ${done}/${otherLangs.length} languages translated</span>`;
  document.getElementById('cms-section-body').innerHTML = renderCMSSection(1);
}

async function cmsAutoTranslate(lang) {
  const status = document.getElementById('cms-lang-translate-status');
  if (!cmsEditing.langs?.en?.name) { if(status) status.textContent = 'Fill English content first (Content tab).'; return; }
  if (status) status.innerHTML = '<span class="spinner" style="display:inline-block;width:14px;height:14px;border-width:2px"></span> Translating…';
  try {
    const tmpSlug = cmsEditing.slug || ('cms-tmp-' + Date.now());
    await db.collection('calc_cms').doc(tmpSlug).set({ ...cmsEditing, slug: tmpSlug }, { merge: true });
    const res = await fetch(`${CMS_BASE}/translateCalc`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug: tmpSlug, targetLang: lang }),
    });
    const data = await res.json();
    if (data.error) { if(status) status.innerHTML = `<span style="color:var(--danger)">Error: ${data.error}</span>`; return; }
    if (!cmsEditing.langs) cmsEditing.langs = {};
    cmsEditing.langs[lang] = { ...(cmsEditing.langs[lang] || {}), ...data.translated };
    if (status) status.innerHTML = '<span style="color:var(--success)">✓ Done — review and edit below.</span>';
    document.getElementById('cms-section-body').innerHTML = renderCMSSection(cmsEditorSection);
  } catch(e) {
    if (status) status.innerHTML = `<span style="color:var(--danger)">Failed: ${e.message}</span>`;
  }
}

// ── SAVE ──
async function saveCMSCalc(status, silent) {
  if (!cmsEditing.slug) {
    const name = cmsEditing.langs?.en?.name || '';
    if (!name) { if(!silent) alert('Fill in the calculator name first (Basic Info tab).'); return; }
    cmsEditing.slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }

  // Normalize unit_options
  (cmsEditing.inputs || []).forEach(inp => {
    if (typeof inp.unit_options === 'string') inp.unit_options = inp.unit_options.split(',').map(s=>s.trim()).filter(Boolean);
  });

  const payload = { ...cmsEditing, status, updated_at: new Date() };
  if (!payload.created_at) payload.created_at = new Date();

  const ind = document.getElementById('cms-save-indicator');
  if (ind) ind.textContent = 'Saving…';

  try {
    await db.collection('calc_cms').doc(cmsEditing.slug).set(payload);
    cmsLastSaved = new Date();
    if (!silent) await loadCMSCalcs();

    if (ind) ind.textContent = status === 'published' ? '🚀 Published' : '✓ Saved';
    setTimeout(() => {
      if (ind) ind.textContent = 'Saved ' + timeAgo(cmsLastSaved);
    }, 2500);

    if (status === 'published' && !silent) {
      const existingLink = document.getElementById('cms-live-link');
      if (!existingLink) {
        const bar = document.querySelector('#cms-editor-view [style*="position:sticky"]');
        if (bar) {
          const link = document.createElement('a');
          link.id = 'cms-live-link';
          link.href = `${SITE_BASE}/en/${cmsEditing.slug}/`;
          link.target = '_blank';
          link.textContent = '↗ View live';
          link.style = 'font-size:.75rem;color:var(--primary);text-decoration:underline';
          bar.appendChild(link);
        }
      }
      // Auto-translate missing languages in background
      autoTranslateMissingLangs(cmsEditing.slug, cmsEditing.langs);
    }
  } catch(e) {
    if (ind) ind.textContent = '✗ Save failed';
    if (!silent) alert('Save failed: ' + e.message);
  }
}

async function deployCalcToHosting() {
  const slug = cmsEditing && cmsEditing.slug;
  if (!slug) { alert('Save the calculator first.'); return; }
  if (cmsEditing.status !== 'published') {
    const ok = confirm('This calculator is not published yet. Publish and deploy now?');
    if (!ok) return;
    await saveCMSCalc('published');
  }

  const btn = document.getElementById('cms-deploy-btn');
  const status = document.getElementById('cms-deploy-status');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Deploying…'; }
  if (status) {
    status.style.display = '';
    status.style.background = 'rgba(59,130,246,.1)';
    status.style.border = '1px solid rgba(59,130,246,.3)';
    status.style.color = 'var(--text)';
    status.textContent = '⏳ Building new HTML and updating Firebase Hosting… This takes 30–90 seconds.';
  }

  try {
    const res = await fetch(`${CMS_BASE}/publishCalcToHosting`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug }),
    });
    const data = await res.json();

    if (data.success) {
      if (status) {
        status.style.background = 'rgba(34,197,94,.1)';
        status.style.border = '1px solid rgba(34,197,94,.3)';
        status.innerHTML = `✅ <strong>Live!</strong> Updated ${data.pagesUpdated.length} page(s): ${data.pagesUpdated.join(', ')}
          &nbsp;·&nbsp; <a href="${SITE_BASE}/en/${slug}/" target="_blank" style="color:var(--primary)">View live ↗</a>`;
      }
      if (btn) { btn.textContent = '✅ Deployed'; btn.style.background = '#22c55e'; }
    } else {
      throw new Error(data.error || 'Unknown error');
    }
  } catch(e) {
    if (status) {
      status.style.background = 'rgba(239,68,68,.1)';
      status.style.border = '1px solid rgba(239,68,68,.3)';

function exportTable(tableId) {
  const table = document.getElementById(tableId);
  if (!table) return;
  let csv = [];
  table.querySelectorAll('tr').forEach(row => {
    csv.push([...row.querySelectorAll('th,td')].map(c => `"${c.textContent.trim().replace(/"/g,'""')}"`).join(','));
  });
  const blob = new Blob([csv.join('\n')],{type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`calctowork-${tableId}-${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

function renderGrowthBriefData(data, el, dateEl) {
  if (dateEl) dateEl.textContent = data.week ? `Week ${data.week}` : '';
  let brief = data.brief || '';
  // Try to parse as structured JSON first
  try {
    const parsed = typeof brief === 'string' ? JSON.parse(brief) : brief;
    if (parsed && parsed.headline) {
      const actions = [parsed.action_1, parsed.action_2, parsed.action_3].filter(Boolean);
      el.innerHTML = `
        <div style="background:var(--card-bg);border-radius:8px;padding:1rem;margin-bottom:.75rem;border-left:3px solid var(--primary)">
          <div style="font-size:1rem;font-weight:700">${parsed.headline || ''}</div>
          ${parsed.traffic_change ? `<div style="font-size:.82rem;color:var(--muted);margin-top:.2rem">${parsed.traffic_change}</div>` : ''}
        </div>
        ${parsed.top_win ? `<div style="margin-bottom:.6rem"><strong style="color:#22c55e">✅ Win:</strong> <span style="font-size:.88rem">${parsed.top_win}</span></div>` : ''}
        ${parsed.top_problem ? `<div style="margin-bottom:.75rem"><strong style="color:var(--danger)">⚠️ Problem:</strong> <span style="font-size:.88rem">${parsed.top_problem}</span></div>` : ''}
        ${actions.length ? `<div style="font-weight:600;font-size:.82rem;color:var(--muted);margin-bottom:.4rem">THIS WEEK'S ACTIONS</div>
        ${actions.map((a, i) => `<div style="display:flex;gap:.6rem;margin-bottom:.5rem;padding:.5rem .7rem;background:rgba(249,115,22,.05);border-radius:6px">
          <span style="font-weight:700;color:var(--primary);flex-shrink:0">${i+1}.</span>
          <div><div style="font-weight:600;font-size:.85rem">${a.what||''}</div>
          <div style="font-size:.78rem;color:var(--muted)">${a.why||''}</div>
          ${a.how ? `<div style="font-size:.78rem;color:var(--muted);font-style:italic">${a.how}</div>` : ''}</div>
        </div>`).join('')}` : ''}
        ${parsed.calc_idea ? `<div style="margin-top:.5rem;padding:.5rem .7rem;background:rgba(34,197,94,.06);border-radius:6px;font-size:.82rem"><strong>💡 Calc idea:</strong> ${parsed.calc_idea}</div>` : ''}`;

async function openPipelineCalc(docId) {
  try {
    const doc = await db.collection('calc_pipeline').doc(docId).get();
    if (!doc.exists) return;
    const d = doc.data();
    const calc = d.generated_calc || {};
    // Normalize formula_js → formula (old pipeline format used full function declaration)
    if (!calc.formula && calc.formula_js) {
      const bodyMatch = calc.formula_js.match(/function\s*\w*\s*\([^)]*\)\s*\{([\s\S]*)\}/);
      calc.formula = bodyMatch ? bodyMatch[1].trim() : calc.formula_js;
      delete calc.formula_js;
    }
    // Load it into the CMS editor
    cmsEditing = { ...calc, _pipelineId: docId };
    if (!cmsEditing.langs) cmsEditing.langs = {};
    if (!cmsEditing.langs.en) cmsEditing.langs.en = {};
    if (!cmsEditing.inputs) cmsEditing.inputs = [];
    if (!cmsEditing.outputs) cmsEditing.outputs = [];
    switchTab('calculators'); // renderCalculatorCMS will detect cmsEditing and open editor after load
  } catch(e) { alert('Could not open: ' + e.message); }
}

async function approvePipelineCalc(docId, btn) {
  if (!confirm('Approve and publish this calculator to the live site?')) return;
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Publishing…'; }
  try {
    const doc = await db.collection('calc_pipeline').doc(docId).get();
    if (!doc.exists) return;
    const calc = doc.data().generated_calc || {};
    if (!calc.slug) { alert('No slug on this draft'); if (btn) { btn.disabled=false; btn.textContent='🚀 Approve'; } return; }

    // 1. Save to calc_cms as published
    showToast('Step 1/3 — Saving to CMS…');
    await db.collection('calc_cms').doc(calc.slug).set({ ...calc, status: 'published', created_at: new Date(), updated_at: new Date() });
    await db.collection('calc_pipeline').doc(docId).update({ status: 'approved', reviewed_at: new Date() });

    // 2. Deploy to hosting (build static HTML files)
    showToast('Step 2/3 — Deploying to live site…');
    const deployRes = await fetch(`${CMS_BASE}/publishCalcToHosting`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug: calc.slug })
    });
    if (!deployRes.ok) throw new Error('Deploy failed: ' + await deployRes.text());

    // 3. Ping Google to crawl the new sitemap
    showToast('Step 3/3 — Pinging Google…');
    await fetch('https://www.google.com/ping?sitemap=https://calcto.work/sitemap.xml', { mode: 'no-cors' });

    showToast(`✅ Live at calcto.work/en/${calc.slug}/ — Google notified!`);
    await loadCMSCalcs();
    loadPipelineQueue('pipeline-list-mount');
  } catch(e) {
    alert('Error: ' + e.message);
    if (btn) { btn.disabled=false; btn.textContent='🚀 Approve'; }
  }
}

      });
    });
    const langLabels = { es:'🇪🇸 ES', fr:'🇫🇷 FR', de:'🇩🇪 DE', it:'🇮🇹 IT', pt:'🇵🇹 PT' };
    const total = snap.size;
    const chips = CMS_LANGS_LIST.map(l => {
      const missing = missingByLang[l].length;
      const pct = total > 0 ? Math.round((total - missing) / total * 100) : 0;
      const color = pct >= 90 ? '#16a34a' : pct >= 60 ? '#f97316' : '#dc2626';
      return `<span title="${missing} calcs missing ${l.toUpperCase()} translation" style="display:inline-flex;align-items:center;gap:.3rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:.25rem .6rem;font-size:.78rem;cursor:pointer" onclick="showLangGapList('${l}')">
        ${langLabels[l]} <span style="font-weight:700;color:${color}">${pct}%</span>
        ${missing > 0 ? `<span style="font-size:.7rem;color:var(--muted)">(${missing} missing)</span>` : ''}
      </span>`;
    }).join('');
    card.innerHTML = `<div class="card" style="padding:.75rem 1rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">
        <span class="card-title" style="font-size:.85rem;margin:0">🌐 Translation Coverage — ${total} published calcs</span>
      </div>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap">${chips}</div>
      <div id="lang-gap-list" style="margin-top:.5rem;max-height:160px;overflow-y:auto;font-size:.75rem;color:var(--muted)"></div>
    </div>`;
    window._langGapData = missingByLang;
  } catch(e) { if (card) card.innerHTML = ''; }
}

function showLangGapList(lang) {
  const el = document.getElementById('lang-gap-list');
  if (!el || !window._langGapData) return;
  const slugs = window._langGapData[lang] || [];
  if (!slugs.length) { el.innerHTML = `<span style="color:#16a34a">All calcs have ${lang.toUpperCase()} translation ✓</span>`; return; }
  el.innerHTML = `<strong style="color:var(--text)">${slugs.length} missing ${lang.toUpperCase()}:</strong> ${slugs.slice(0,50).map(s => `<a href="#" onclick="event.preventDefault();openCMSEditor('${s}')" style="color:var(--primary)">${s}</a>`).join(', ')}${slugs.length > 50 ? ` … +${slugs.length-50} more` : ''}`;
}

async function loadSEOSuggestions() {
  const el = document.getElementById('seo-suggestions-panel');
  if (!el) return;
  try {
    const snap = await db.collection('seo_suggestions').where('status','==','pending').orderBy('created_at','desc').limit(10).get();
    if (snap.empty) {
      el.innerHTML = '<div style="color:var(--muted);font-size:.82rem;padding:.5rem 0">No pending suggestions. Click "Run AI Analysis" to generate.</div>';
      return;
    }
    el.innerHTML = snap.docs.map(doc => {
      const d = doc.data();
      return `<div style="padding:.85rem 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:flex-start;gap:1rem">
          <div style="flex:1;min-width:0">
            <div style="font-size:.8rem;color:var(--muted);margin-bottom:.3rem"><span style="font-weight:600;color:var(--primary)">${(d.lang||'en').toUpperCase()}</span> /${d.lang_slug||d.slug}/ · pos ${d.current_position?.toFixed(1)||'?'} · CTR ${((d.current_ctr||0)*100).toFixed(1)}% · ${d.impressions} impr</div>
            <div style="margin-bottom:.4rem">
              <span style="font-size:.75rem;color:var(--muted)">Current:</span> <span style="font-size:.82rem">${d.current_title||d.slug}</span>
            </div>
            <div style="background:rgba(34,197,94,.06);padding:.4rem .6rem;border-radius:6px;margin-bottom:.2rem">
              <span style="font-size:.75rem;color:var(--success)">Suggested:</span> <span style="font-size:.82rem;font-weight:600">${d.suggested_title}</span>
            </div>
            <div style="font-size:.75rem;color:var(--muted)">${d.suggested_desc}</div>
          </div>
          <div style="display:flex;gap:.35rem;flex-shrink:0">
            <button onclick="applySEOSuggestion('${doc.id}')" class="btn btn-sm" style="background:#22c55e">Apply</button>
            <button onclick="dismissSEOSuggestion('${doc.id}')" class="btn btn-sm btn-outline">Dismiss</button>
          </div>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    if (el) el.innerHTML = `<span style="color:var(--danger)">Error: ${e.message}</span>`;
  }
}

async function loadSEOSuggestionsForOps() {
  const el = document.getElementById('ops-seo-panel');
  if (!el) return;
  try {
    const snap = await db.collection('seo_suggestions').where('status','==','pending').orderBy('created_at','desc').limit(5).get();
    if (snap.empty) {
      el.innerHTML = '<div style="color:var(--muted);font-size:.82rem;padding:.5rem 0">No suggestions yet. Click "Run Analysis".</div>';
      return;
    }
    el.innerHTML = snap.docs.map(doc => {
      const d = doc.data();
      return `<div style="display:flex;align-items:center;gap:.75rem;padding:.6rem 0;border-bottom:1px solid var(--border)">
        <div style="flex:1">
          <span style="font-weight:600;font-size:.85rem">${d.suggested_title}</span>
          <span style="font-size:.72rem;color:var(--muted);margin-left:.4rem">pos ${d.current_position?.toFixed(1)||'?'} · ${d.impressions} impr</span>
        </div>
        <button onclick="applySEOSuggestion('${doc.id}')" class="btn btn-sm" style="background:#22c55e">Apply</button>
      </div>`;
    }).join('') + `<div style="padding:.5rem 0;font-size:.78rem;color:var(--muted)"><a href="#" onclick="switchTab('technical')">See all in Technical SEO tab →</a></div>`;
  } catch(e) {
    if (el) el.innerHTML = `<span style="color:var(--danger)">Error: ${e.message}</span>`;
  }
}

async function applySEOSuggestion(docId) {
  try {
    const doc = await db.collection('seo_suggestions').doc(docId).get();
    if (!doc.exists) return;
    const d = doc.data();
    // Apply to calc_cms using the correct language
    const lang = d.lang || 'en';
    const cmsDoc = await db.collection('calc_cms').doc(d.slug).get();
    if (cmsDoc.exists) {
      const langs = cmsDoc.data().langs || {};
      langs[lang] = { ...(langs[lang]||{}), seo_title: d.suggested_title, seo_description: d.suggested_desc };
      await db.collection('calc_cms').doc(d.slug).update({ langs, updated_at: new Date() });
      // Redeploy so the live <title> updates immediately
      showToast('Applying SEO + redeploying page…');
      const deployRes = await fetch(`${CMS_BASE}/publishCalcToHosting`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ slug: d.slug })
      });
      if (!deployRes.ok) console.warn('Redeploy warning:', await deployRes.text());
    }
    await db.collection('seo_suggestions').doc(docId).update({
      status: 'applied',
      applied_at: new Date(),
      reviewed_at: new Date(),
      outcome_measured: false,
      position_at_apply: d.current_position || null,
    });
    showToast(`✅ SEO live on /${lang}/${d.lang_slug || d.slug}/`);
    loadSEOSuggestions();
    loadSEOSuggestionsForOps();
  } catch(e) { alert('Error: ' + e.message); }
}

async function dismissSEOSuggestion(docId) {
  await db.collection('seo_suggestions').doc(docId).update({ status: 'dismissed', reviewed_at: new Date() });
  loadSEOSuggestions();
}

async function triggerSEOSuggestions() {
  showToast('Running SEO analysis… ~1 minute.');
  try {
    const res = await fetch(`${CMS_BASE}/generateSEOSuggestionsHttp`, { method: 'POST' });
    const data = await res.json();
    showToast(`Done! ${data.suggestions || 0} suggestions generated.`);
    loadSEOSuggestions();
    loadSEOSuggestionsForOps();
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

async function autoTranslateMissingLangs(slug, langs) {
  const missingLangs = ['es','fr','de','it','pt'].filter(l => !langs?.[l]?.name);
  if (!missingLangs.length || !langs?.en?.name) return;
  showToast(`🌐 Auto-translating to ${missingLangs.join(', ')}…`);
  for (const lang of missingLangs) {
    try {
      const res = await fetch(`${CMS_BASE}/translateCalc`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ slug, targetLang: lang }),
      });
      const data = await res.json();
      if (data.success) showToast(`✓ ${lang.toUpperCase()} translation done`);
      await new Promise(r => setTimeout(r, 1200));
    } catch(e) { console.warn('Auto-translate failed for', lang, e.message); }
  }
  showToast('🌐 All translations complete!');
  await loadCMSCalcs();
}

async function pingSitemap() {
  const out = document.getElementById('sitemap-ping-out');
  if (out) out.textContent = 'Pinging…';
  try {
    await fetch('https://www.google.com/ping?sitemap=https://calcto.work/sitemap.xml', { mode: 'no-cors' });
    if (out) out.textContent = '✅ Pinged Google';
    showToast('Google pinged — sitemap will be crawled within 24–48h');
  } catch(e) {
    if (out) out.textContent = '✅ Ping sent (no-cors)';
  }
}

async function triggerAutoPilot() {
  showToast('Running auto-pilot… fills translations + fixes meta descriptions. ~2 min.');
  try {
    const res = await fetch(`${CMS_BASE}/runAutoPilotHttp`, { method: 'POST' });
    const data = await res.json();
    showToast(`Done! ${data.translations||0} translations, ${data.metaFixed||0} meta descriptions fixed.`);
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

function showToast(msg, type) {
  let toast = document.getElementById('global-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'global-toast';
    toast.style = 'position:fixed;bottom:1.5rem;right:1.5rem;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.75rem 1.1rem;font-size:.85rem;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.4);max-width:360px;transition:opacity .3s';
    document.body.appendChild(toast);
  }
  toast.style.color = type === 'error' ? 'var(--danger)' : 'var(--text)';
  toast.textContent = msg;
  toast.style.opacity = '1';
  clearTimeout(toast._hideTimer);
  toast._hideTimer = setTimeout(() => { toast.style.opacity = '0'; }, 4000);
}

// Init pipeline badge on load
async function initPipelineBadge() {
  try {
    const snap = await db.collection('calc_pipeline').where('status','==','pending').limit(50).get();
    const badge = document.getElementById('pipeline-badge');
    if (badge && snap.size > 0) { badge.textContent = snap.size; badge.style.display = ''; }
  } catch(e) {}
}
