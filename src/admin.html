<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>CalcToWork Growth Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<!-- sha256 via built-in Web Crypto (no CDN dependency) -->
<style>
:root{--primary:#f97316;--primary-glow:rgba(249,115,22,.25);--success:#22c55e;--warning:#f59e0b;--danger:#ef4444;--info:#3b82f6;--purple:#8b5cf6;--bg:#0a0e17;--sidebar:#0d1320;--card:#111827;--card-hover:#161e2c;--text:#e2e8f0;--muted:#64748b;--border:#1e293b;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,.4)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;display:flex;min-height:100vh}
a{color:var(--primary);text-decoration:none}

/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;width:100%;min-height:100vh;background:linear-gradient(160deg,#0a0e17 0%,#1a1025 50%,#0a0e17 100%)}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 25px 60px rgba(0,0,0,.5)}
.login-card h1{color:var(--primary);font-size:1.5rem;margin-bottom:.5rem;text-align:center}
.login-card p{color:var(--muted);font-size:.875rem;margin-bottom:1.5rem;text-align:center}
.login-card input{width:100%;padding:.75rem 1rem;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.95rem;margin-bottom:.75rem;outline:none;transition:border-color .2s}
.login-card input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}
.login-card button{width:100%;padding:.75rem;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .2s,transform .1s}
.login-card button:hover{background:#ea580c}
.login-error{color:var(--danger);font-size:.8rem;margin-bottom:.5rem;text-align:center;min-height:20px}

/* SIDEBAR */
.sidebar{width:240px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;overflow-y:auto}
.sidebar-brand{padding:1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem}
.sidebar-brand svg{width:28px;height:28px;color:var(--primary)}
.sidebar-brand span{font-size:1.1rem;font-weight:700}
.sidebar-brand span em{color:var(--primary);font-style:normal}
.sidebar-nav{flex:1;padding:.75rem;overflow-y:auto}
.sidebar-nav a{display:flex;align-items:center;gap:.6rem;padding:.65rem .85rem;border-radius:8px;color:var(--muted);font-size:.85rem;font-weight:500;transition:all .15s;margin-bottom:.15rem}
.sidebar-nav a:hover{background:var(--card);color:var(--text)}
.sidebar-nav a.active{background:rgba(249,115,22,.12);color:var(--primary)}
.sidebar-nav a svg{width:18px;height:18px;flex-shrink:0}
.sidebar-nav a .badge-count{background:var(--danger);color:#fff;border-radius:10px;padding:1px 7px;font-size:.65rem;font-weight:700;margin-left:auto}
.sidebar-footer{padding:.75rem;border-top:1px solid var(--border)}
.sidebar-footer button{width:100%;padding:.55rem;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:.8rem;cursor:pointer;transition:all .15s}
.sidebar-footer button:hover{color:var(--danger);border-color:var(--danger)}

/* MAIN */
.main{flex:1;margin-left:240px;min-height:100vh}
.topbar{background:var(--sidebar);border-bottom:1px solid var(--border);padding:.85rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:40;gap:1rem}
.topbar h2{font-size:1.1rem;font-weight:600;white-space:nowrap}
.topbar-center{display:flex;align-items:center;gap:.5rem;flex:1;justify-content:center}
.topbar-right{display:flex;align-items:center;gap:.75rem;font-size:.8rem;color:var(--muted);white-space:nowrap}
.topbar-right .live-dot{width:8px;height:8px;background:var(--success);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.content{padding:1.5rem;max-width:1600px}
.tab-content{display:none}
.tab-content.active{display:block}

/* KPIs */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.15rem;position:relative;overflow:hidden;transition:border-color .2s}
.kpi:hover{border-color:var(--primary)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kpi-bar,var(--primary));opacity:.5}
.kpi-label{font-size:.68rem;text-transform:uppercase;color:var(--muted);letter-spacing:.06em;margin-bottom:.3rem}
.kpi-value{font-size:1.75rem;font-weight:700;line-height:1.1}
.kpi-sub{font-size:.72rem;color:var(--muted);margin-top:.25rem;display:flex;align-items:center;gap:.25rem}
.kpi-sub.up{color:var(--success)}
.kpi-sub.down{color:var(--danger)}
.kpi-sub.neutral{color:var(--muted)}
.kpi-sparkline{width:100%;height:30px;margin-top:.25rem}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.5rem}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
.card-title{font-size:.95rem;font-weight:600;color:var(--text)}
.card-actions{display:flex;gap:.5rem;align-items:center}
.card-actions button,.card-actions select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:.35rem .65rem;border-radius:6px;font-size:.78rem;cursor:pointer}
.card-actions button:hover,.card-actions select:hover{background:var(--card-hover)}
.chart-wrap{position:relative;width:100%;min-height:250px}
.chart-wrap canvas{width:100%!important}

/* Tables */
.data-table{width:100%;border-collapse:collapse;font-size:.81rem}
.data-table th,.data-table td{padding:.55rem .7rem;text-align:left;border-bottom:1px solid var(--border)}
.data-table th{color:var(--muted);font-weight:600;font-size:.68rem;text-transform:uppercase;letter-spacing:.04em;position:sticky;top:0;background:var(--card);cursor:pointer;user-select:none}
.data-table th:hover{color:var(--text)}
.data-table th .sort-arrow{font-size:.6rem;margin-left:3px}
.data-table tbody tr{transition:background .1s;cursor:pointer}
.data-table tbody tr:hover{background:var(--card-hover)}
.data-table .num{text-align:right;font-variant-numeric:tabular-nums}

.badge{display:inline-block;padding:.15rem .45rem;border-radius:5px;font-size:.7rem;font-weight:600}
.badge-green{background:rgba(34,197,94,.15);color:var(--success)}
.badge-orange{background:rgba(249,115,22,.15);color:var(--primary)}
.badge-red{background:rgba(239,68,68,.15);color:var(--danger)}
.badge-blue{background:rgba(59,130,246,.15);color:var(--info)}
.badge-purple{background:rgba(139,92,246,.15);color:var(--purple)}

/* Time select */
.time-select{display:flex;gap:.25rem;background:var(--bg);border-radius:8px;padding:.2rem}
.time-select button{padding:.4rem .8rem;border:none;background:transparent;color:var(--muted);border-radius:6px;font-size:.78rem;cursor:pointer;font-weight:500}
.time-select button.active{background:var(--primary);color:#fff}

/* Grid layouts */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.5rem}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5rem}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:2rem;color:var(--muted)}
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite;margin-right:.5rem}
@keyframes spin{to{transform:rotate(360deg)}}

/* Buttons */
.btn{background:var(--primary);color:#fff;border:none;padding:.4rem .9rem;border-radius:6px;font-size:.78rem;cursor:pointer;font-weight:500;transition:background .2s}
.btn:hover{background:#ea580c}
.btn-sm{padding:.3rem .65rem;font-size:.72rem}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{background:var(--card-hover);color:var(--text)}
.btn-outline.active{background:rgba(249,115,22,.15);color:var(--primary);border-color:var(--primary)}

/* Tabs inline */
.tab-bar{display:flex;gap:.25rem;background:var(--bg);border-radius:8px;padding:.2rem;margin-bottom:1rem;overflow-x:auto}
.tab-bar button{padding:.45rem 1rem;border:none;background:transparent;color:var(--muted);border-radius:6px;font-size:.8rem;cursor:pointer;font-weight:500;white-space:nowrap}
.tab-bar button.active{background:var(--primary);color:#fff}

/* Alert items */
.alert-item{display:flex;align-items:center;gap:.75rem;padding:.75rem;border-radius:8px;margin-bottom:.5rem;border:1px solid var(--border)}
.alert-item.high{border-left:3px solid var(--danger);background:rgba(239,68,68,.05)}
.alert-item.medium{border-left:3px solid var(--warning);background:rgba(245,158,11,.05)}
.alert-item.low{border-left:3px solid var(--info);background:rgba(59,130,246,.05)}
.alert-icon{font-size:1.2rem;flex-shrink:0}
.alert-body{flex:1}
.alert-title{font-size:.82rem;font-weight:600}
.alert-detail{font-size:.72rem;color:var(--muted);margin-top:2px}
.alert-actions{flex-shrink:0}

/* Funnel */
.funnel-bar{display:flex;align-items:center;gap:1rem;margin:.75rem 0}
.funnel-label{font-size:.78rem;color:var(--muted);width:100px;text-align:right}
.funnel-fill{height:32px;border-radius:6px;transition:width .5s ease;min-width:20px}
.funnel-count{font-size:.85rem;font-weight:600;white-space:nowrap}
.funnel-drop{font-size:.7rem;color:var(--danger);white-space:nowrap}

/* Responsive */
@media(max-width:768px){
  .sidebar{width:60px}
  .sidebar-brand span,.sidebar-nav a span,.sidebar-nav a .badge-count,.sidebar-footer button span{display:none}
  .sidebar-nav a{justify-content:center;padding:.65rem}
  .main{margin-left:60px}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .topbar{flex-wrap:wrap}
  .tab-bar button{font-size:.72rem;padding:.35rem .6rem}
}

.empty-state{text-align:center;padding:3rem;color:var(--muted)}
.skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--card-hover) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Tooltip */
.tooltip{position:relative}
.tooltip::after{content:attr(data-tip);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#1e293b;color:var(--text);padding:4px 8px;border-radius:4px;font-size:.7rem;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s}
.tooltip:hover::after{opacity:1}

/* Filter pills */
.filter-pills{display:flex;gap:.35rem;flex-wrap:wrap}
.filter-pill{padding:.25rem .6rem;border-radius:12px;font-size:.7rem;cursor:pointer;background:var(--bg);border:1px solid var(--border);color:var(--muted);transition:all .15s}
.filter-pill:hover{border-color:var(--muted);color:var(--text)}
.filter-pill.active{background:rgba(249,115,22,.15);color:var(--primary);border-color:var(--primary)}
</style>
</head>
<body>

<!-- LOGIN — standalone script, no Firebase dependency -->
<script>
const PASS_HASH = '240be518fabd2724ddb6f04eeb1da5967448d7e831c08c8fa822809f74c720a9';
async function doLogin() {
  const pass = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  if (!pass) { errEl.textContent = 'Enter password'; return; }
  btn.disabled = true;
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pass));
  const hash = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  if (hash === PASS_HASH) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    try {
    if (typeof initDashboard === 'function') {
      initDashboard();
    } else {
      document.getElementById('content-area').innerHTML = '<div style="color:red;padding:2rem">ERROR: initDashboard not defined — check browser console for script errors</div>';
    }
  } catch(e) {
    document.getElementById('content-area').innerHTML = '<div style="color:red;padding:2rem">ERROR in initDashboard: ' + e.message + '</div>';
  }
  } else {
    errEl.textContent = 'Wrong password';
    btn.disabled = false;
  }
}
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
});
</script>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="login-wrap">
  <div class="login-card">
    <h1>CalcToWork Growth</h1>
    <p>Enter password to access the growth dashboard</p>

    <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">

  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg>
      <span>Calc<em>To</em>Work</span>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button onclick="doLogout()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Logout</span>
      </button>

  <main class="main" id="main-content">

      </div>

        <span id="refresh-time" style="font-size:.72rem"></span>
        <button id="btn-toggle-bots" onclick="toggleBots()" class="btn-outline btn-sm">Show Bots</button>
        <button class="btn-outline btn-sm" onclick="refreshAll()">↻ Refresh</button>
        <span class="live-dot"></span> Live
      </div>
    </div>
    <div class="content" id="content-area"></div>
  </main>
</div>

<script>
// ── FIREBASE INIT (lazy — inside initDashboard so login works even if SDK fails) ──
const fbConfig = {
  apiKey:"AIzaSyBmjGOakF8HneBc2cnmt6WeEfU4JWgJFw8",
  authDomain:"calctowork.firebaseapp.com",
  projectId:"calctowork",
  storageBucket:"calctowork.firebasestorage.app",
  messagingSenderId:"538330151764",
  appId:"1:538330151764:web:175e3ff0f7d87f706b66c1"
};
let db = null;
try {
  firebase.initializeApp(fbConfig);
  db = firebase.firestore();
} catch(e) {
  console.error('Firebase init error:', e);
}

// ── AUTH ──
let loggedIn = false, unsubscribers = [];

function doLogout() {
  loggedIn = false;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  unsubscribeAll();
}

function unsubscribeAll() {
  unsubscribers.forEach(fn => { try { fn(); } catch(e) {} });
  unsubscribers = [];
  if (activityUnsub) { try { activityUnsub(); } catch(e) {} activityUnsub = null; }
}

// ── STATE ──
let currentTab = 'overview';
let currentTimeRange = 'today';
let customDateStart = '';
let customDateEnd = '';
let showBots = false;
let lastRefreshTime = null;
let analyticsEvents = [];
let gscQueries = [];
let gscPages = [];
let gscSiteStats = [];
let alerts = [];
let alertCount = 0;
let movementData = [];
let indexCoverage = null;
let goals = JSON.parse(localStorage.getItem('ctw_goals') || '{"clicks":0,"impressions":0}');
let abTests = JSON.parse(localStorage.getItem('ctw_abtests') || '[]');
let roadmapStatus = JSON.parse(localStorage.getItem('ctw_roadmap') || '{}');

// ── GSC CACHE (per days-bucket, valid 10 min) ──
const gscCache = {};
function gscCacheKey(days) { return 'd' + days; }
function gscCacheValid(days) {
  const k = gscCacheKey(days);
  return gscCache[k] && (Date.now() - gscCache[k].ts < 10 * 60 * 1000);
}
function gscCacheStore(days, q, p, s) {
  gscCache[gscCacheKey(days)] = { queries: q, pages: p, stats: s, ts: Date.now() };
}
function gscCacheLoad(days) {
  const c = gscCache[gscCacheKey(days)];
  gscQueries = c.queries; gscPages = c.pages; gscSiteStats = c.stats;
}

// ── FIRESTORE PREFS ──
const PREFS_DOC = () => db.collection('admin_prefs').doc('main');

async function loadPrefs() {
  try {
    const doc = await PREFS_DOC().get();
    if (doc.exists) {
      const d = doc.data();
      if (d.goals) { goals = d.goals; localStorage.setItem('ctw_goals', JSON.stringify(d.goals)); }
      if (d.abTests) { abTests = d.abTests; localStorage.setItem('ctw_abtests', JSON.stringify(d.abTests)); }
      if (d.roadmapStatus) { roadmapStatus = d.roadmapStatus; localStorage.setItem('ctw_roadmap', JSON.stringify(d.roadmapStatus)); }
    }
  } catch(e) { /* offline — localStorage fallback already loaded */ }
}

async function savePrefsField(field, value) {
  localStorage.setItem('ctw_' + (field === 'abTests' ? 'abtests' : field === 'roadmapStatus' ? 'roadmap' : field), JSON.stringify(value));
  try { await PREFS_DOC().set({ [field]: value }, { merge: true }); } catch(e) {}
}

// ── TABS ──
const TABS = [
  { id:'overview', label:'Overview', icon:'📊' },
  { id:'search', label:'Search Console', icon:'🔍' },
  { id:'content', label:'Content', icon:'📝' },
  { id:'traffic', label:'Traffic', icon:'📈' },
  { id:'technical', label:'Technical SEO', icon:'⚙️' },
  { id:'opportunities', label:'Opportunities', icon:'💡' },
  { id:'alerts', label:'Alerts', icon:'🔔' },
  { id:'calculators', label:'Calculators', icon:'🧮' },
  { id:'autopilot', label:'Autopilot', icon:'🚀' },
  { id:'ai', label:'AI Tools', icon:'🤖' },
  { id:'settings', label:'Settings', icon:'⚙️' },
];

function initDashboard() {
  document.getElementById('sidebar-nav').innerHTML = TABS.map(function(t) {
    var badge = '';
    if (t.id === 'alerts') badge = '<span class="badge-count" id="alert-badge" style="display:none">0</span>';
    if (t.id === 'calculators') badge = '<span class="badge-count" id="pipeline-badge" style="display:none">0</span>';
    return '<a href="#" data-tab="' + t.id + '" onclick="switchTab(\'' + t.id + '\')">' +
      '<span>' + t.icon + '</span><span>' + t.label + '</span>' + badge + '</a>';
  }).join('');

  document.getElementById('time-select').innerHTML = renderTimeBar();

  setupNavigation();
  loadPrefs().then(() => { switchTab('overview'); initPipelineBadge(); });
}

function switchTab(tabId) {
  currentTab = tabId;
  document.querySelectorAll('#sidebar-nav a').forEach(a => a.classList.remove('active'));
  document.querySelector(`[data-tab="${tabId}"]`)?.classList.add('active');
  document.getElementById('page-title').textContent = TABS.find(t=>t.id===tabId)?.label || tabId;

  unsubscribeAll();
  const area = document.getElementById('content-area');
  area.innerHTML = '';

  switch (tabId) {
    case 'overview': renderOverview(area); break;
    case 'search': renderSearchConsole(area); break;
    case 'content': renderContent(area); break;
    case 'traffic': renderTraffic(area); break;
    case 'technical': renderTechnical(area); break;
    case 'opportunities': renderOpportunities(area); break;
    case 'alerts': renderAlertsTab(area); break;
    case 'calculators': renderCalculatorCMS(area); break;
    case 'autopilot': renderAutopilot(area); break;
    case 'ai': renderAITools(area); break;
    case 'settings': renderSettings(area); break;
  }
}

// ── TIME HELPERS ──
function getTimeRange() {
  const now = new Date();
  switch(currentTimeRange) {
    case 'today': return { start: new Date(now.getFullYear(),now.getMonth(),now.getDate()), label:'Today', days:2 };
    case 'yesterday': return { start: new Date(now.getFullYear(),now.getMonth(),now.getDate()-1), end: new Date(now.getFullYear(),now.getMonth(),now.getDate()), label:'Yesterday', days:2 };
    case '7d':   return { start: new Date(now-7*86400000),  label:'Last 7 days',  days:7  };
    case '14d':  return { start: new Date(now-14*86400000), label:'Last 14 days', days:14 };
    case '30d':  return { start: new Date(now-30*86400000), label:'Last 30 days', days:30 };
    case '60d':  return { start: new Date(now-60*86400000), label:'Last 60 days', days:60 };
    case '90d':  return { start: new Date(now-90*86400000), label:'Last 90 days', days:90 };
    case 'month': {
      const s = new Date(now.getFullYear(), now.getMonth(), 1);
      return { start: s, label:'This month', days: Math.ceil((now - s)/86400000)+1 };
    }
    case 'lastmonth': {
      const s = new Date(now.getFullYear(), now.getMonth()-1, 1);
      const e = new Date(now.getFullYear(), now.getMonth(), 1);
      return { start: s, end: e, label:'Last month', days: Math.ceil((e - s)/86400000) };
    }
    case 'custom': {
      if (customDateStart && customDateEnd) {
        const s = new Date(customDateStart + 'T00:00:00');
        const e = new Date(customDateEnd + 'T23:59:59');
        const d = Math.max(1, Math.ceil((e - s)/86400000)+1);
        return { start: s, end: e, label: customDateStart + ' → ' + customDateEnd, days: d };
      }
      return { start: new Date(now-30*86400000), label:'Custom range', days:30 };
    }
    default: return { start: new Date(now.getFullYear(),now.getMonth(),now.getDate()), label:'Today', days:1 };
  }
}

function ctrBenchmark(pos) {
  const p = Math.round(pos);
  return ({1:.28,2:.15,3:.11,4:.08,5:.07,6:.055,7:.045,8:.035,9:.03,10:.025})[p] || (pos<=20?.01:.005);
}

function linearForecast(points, futureDays) {
  if (points.length < 2) return null;
  const n = points.length;
  const xs = points.map((_,i) => i);
  const ys = points;
  const mx = xs.reduce((a,b)=>a+b,0)/n, my = ys.reduce((a,b)=>a+b,0)/n;
  const num = xs.reduce((s,x,i)=>s+(x-mx)*(ys[i]-my),0);
  const den = xs.reduce((s,x)=>s+(x-mx)**2,0);
  if(den===0) return null;
  const slope = num/den, intercept = my - slope*mx;
  return Math.max(0, Math.round(slope*(n+futureDays-1)+intercept));
}

function queryEvents(callback) {
  const { start, end } = getTimeRange();
  let q = db.collection('analytics_events')
    .where('event_time','>=',firebase.firestore.Timestamp.fromDate(start))
    .orderBy('event_time','desc');
  if (end) q = q.where('event_time','<',firebase.firestore.Timestamp.fromDate(end));
  q = q.limit(10000);

  const unsub = q.onSnapshot(snap => {
    const events = [];
    snap.forEach(doc => events.push({ id:doc.id, ...doc.data() }));
    lastRefreshTime = new Date();
    updateRefreshBadge();
    analyticsEvents = showBots ? events : events.filter(e => !e.is_bot);
    callback(analyticsEvents);
  }, err => console.error('Firestore error:', err));
  unsubscribers.push(unsub);
}

async function loadGscData(overrideDays, forceRefresh) {
  const { days } = getTimeRange();
  const d = overrideDays || days;
  if (!forceRefresh && gscCacheValid(d)) { gscCacheLoad(d); return; }
  try {
    const base = `https://us-central1-calctowork.cloudfunctions.net`;
    const [qRes, pRes, sRes] = await Promise.all([
      fetch(`${base}/getGscData?type=queries&days=${d}&limit=500`).then(r=>r.json()).catch(()=>[]),
      fetch(`${base}/getGscData?type=pages&days=${d}&limit=500`).then(r=>r.json()).catch(()=>[]),
      fetch(`${base}/getGscData?type=site_stats&days=${d}&limit=90`).then(r=>r.json()).catch(()=>[]),
    ]);
    gscQueries = Array.isArray(qRes) ? qRes : [];
    gscPages = Array.isArray(pRes) ? pRes : [];
    gscSiteStats = Array.isArray(sRes) ? sRes : [];
    gscCacheStore(d, gscQueries, gscPages, gscSiteStats);
  } catch(e) {
    console.warn('GSC data not loaded:', e.message);
    gscQueries = []; gscPages = []; gscSiteStats = [];
  }
}

async function loadAlerts() {
  try {
    const base = `https://us-central1-calctowork.cloudfunctions.net`;
    const res = await fetch(`${base}/getAlerts?limit=50`).then(r=>r.json()).catch(()=>[]);
    alerts = Array.isArray(res) ? res : [];
    alertCount = res.filter(a => !a.acknowledged).length;
    const badge = document.getElementById('alert-badge');
    if (badge) {
      badge.textContent = alertCount;
      badge.style.display = alertCount > 0 ? '' : 'none';
    }
  } catch(e) {
    alerts = []; alertCount = 0;
  }
}

let overviewCharts = {};
function updateOverview(events) {
  Object.values(overviewCharts).forEach(c => { try{c.destroy();}catch(e){} });
  overviewCharts = {};

  // KPIs
  const uniqueUsers = new Set(), uniqueSessions = new Set(), sessionEvents = {};
  let pageViews=0, calculations=0, copies=0, shares=0, timeTotal=0, timeCount=0;

  events.forEach(e => {
    uniqueUsers.add(e.user_id); uniqueSessions.add(e.session_id);
    const sid=e.session_id;
    if(!sessionEvents[sid]) sessionEvents[sid]=[];
    sessionEvents[sid].push(e.event_name);
    if(e.event_name==='page_view') pageViews++;
    if(e.event_name==='calculation_completed') calculations++;
    if(e.event_name==='copy_results') copies++;
    if(e.event_name==='share_clicked') shares++;
    if(e.seconds){ timeTotal+=e.seconds; timeCount++; }
  });

  let bounced=0;
  Object.values(sessionEvents).forEach(evts=>{
    if(!evts.some(en=>en==='calculation_completed'||en==='copy_results'||en==='share_clicked'||en==='scroll_depth'||en==='input_changed')) bounced++;
  });
  const totalSessions=uniqueSessions.size;
  const bounceRate=totalSessions>0?((bounced/totalSessions)*100).toFixed(1):'0';
  const avgTime=timeCount>0?Math.round(timeTotal/timeCount):0;
  const convRate=pageViews>0?((calculations/pageViews)*100).toFixed(1):'0';

  // GSC totals
  const allGscClicks = gscQueries.reduce((s,r)=>s+(r.clicks||0),0);
  const allGscImpr = gscQueries.reduce((s,r)=>s+(r.impressions||0),0);
  const allGscCtr = allGscImpr>0?((allGscClicks/allGscImpr)*100).toFixed(1):'0';
  const positions = gscQueries.map(r=>r.position).filter(p=>p>0);
  const avgPosition = positions.length>0?(positions.reduce((a,b)=>a+b,0)/positions.length).toFixed(1):'--';

  const kpis = [
    { label:'Organic Clicks', value:allGscClicks.toLocaleString(), sub:`${allGscCtr}% CTR`, cls:'', isGsc:true },
    { label:'Impressions', value:allGscImpr.toLocaleString(), sub:`Avg pos ${avgPosition}`, cls:'', isGsc:true },
    { label:'Users', value:uniqueUsers.size, sub:`${totalSessions} sessions`, cls:'' },
    { label:'Page Views', value:pageViews.toLocaleString(), sub:'', cls:'' },
    { label:'Calculations', value:calculations.toLocaleString(), sub:`${convRate}% conv`, cls:'' },
    { label:'Bounce Rate', value:`${bounceRate}%`, sub:`${bounced} of ${totalSessions}`, cls:bounced>totalSessions*0.7?'danger':bounced>totalSessions*0.4?'warning':'ok' },
    { label:'Avg Time', value:`${avgTime}s`, sub:`${timeCount} samples`, cls:'' },
    { label:'Events', value:events.length.toLocaleString(), sub:getTimeRange().label+(showBots?' (bots on)':''), cls:'' },
  ];

  document.getElementById('overview-kpis').innerHTML = kpis.map(k => {
    let bar=''; if(k.cls==='danger')bar='style="--kpi-bar:#ef4444"'; else if(k.cls==='warning')bar='style="--kpi-bar:#f59e0b"'; else if(k.cls==='ok')bar='style="--kpi-bar:#22c55e"';
    return `<div class="kpi" ${bar}><div class="kpi-label">${k.label}${k.isGsc?' 🔍':''}</div><div class="kpi-value">${k.value}</div>${k.sub?`<div class="kpi-sub">${k.sub}</div>`:''}</div>`;
  }).join('');

  // Goals widget
  const goalsEl = document.getElementById('goals-panel');
  if (goalsEl) {
    const goalClicks = goals.clicks || 0, goalImpr = goals.impressions || 0;
    const monthClicks = gscSiteStats.reduce((s,r)=>s+(r.total_clicks||0),0);
    const monthImpr   = gscSiteStats.reduce((s,r)=>s+(r.total_impressions||0),0);

  // Clicks & Impressions chart

        { label:'Impressions', data:sorted.map(d=>d.total_impressions), borderColor:'#3b82f6', backgroundColor:'rgba(59,130,246,.6)', fill:true, tension:.3, pointRadius:sorted.length<=3?4:0, yAxisID:'y1', borderRadius:4 }
      ]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{labels:{color:'#94a3b8',font:{size:11}}}}, scales:{
        x:{ticks:{color:'#64748b',maxTicksLimit:10,font:{size:10}},grid:{color:'#1e293b'}},
        y:{ticks:{color:'#64748b'},grid:{color:'#1e293b'},beginAtZero:true,position:'left'},
        y1:{position:'right',ticks:{color:'#3b82f6'},grid:{display:false},beginAtZero:true}
      }, interaction:{intersect:false,mode:'index'} }
    });
  }

  // Views & Calcs chart
  const hourly={};
  events.forEach(e=>{if(!e.event_time)return;const h=new Date(e.event_time.seconds*1000);const key=`${h.getMonth()+1}/${h.getDate()} ${h.getHours()}:00`;if(!hourly[key])hourly[key]={views:0,calcs:0};if(e.event_name==='page_view')hourly[key].views++;if(e.event_name==='calculation_completed')hourly[key].calcs++;});
  const sortedH=Object.entries(hourly).sort((a,b)=>{const[am,ad,ah]=a[0].split(/[\/\s:]/).map(Number);const[bm,bd,bh]=b[0].split(/[\/\s:]/).map(Number);return am!==bm?am-bm:ad!==bd?ad-bd:ah-bh;});
  const ctx2=document.getElementById('chart-ov-views-calcs')?.getContext('2d');
  if(ctx2) overviewCharts.viewsCalcs = new Chart(ctx2,{

    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#94a3b8',font:{size:11}}}},scales:{x:{ticks:{color:'#64748b',maxTicksLimit:10,font:{size:10}},grid:{color:'#1e293b'}},y:{ticks:{color:'#64748b'},grid:{color:'#1e293b'},beginAtZero:true}},interaction:{intersect:false,mode:'index'}}
  });

  // Top queries bar chart
  const topQ = gscQueries.slice(0,10);
  const qCtx = document.getElementById('chart-ov-queries')?.getContext('2d');
  if (qCtx && topQ.length) overviewCharts.topQ = new Chart(qCtx,{
    type:'bar',data:{labels:topQ.map(r=>(r.query||'').slice(0,25)),datasets:[{data:topQ.map(r=>r.clicks||0),backgroundColor:'rgba(249,115,22,.6)',borderRadius:3}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#64748b',font:{size:9}},grid:{color:'#1e293b'}},y:{ticks:{color:'#94a3b8',font:{size:9}},grid:{display:false}}}}
  });

  // Top pages bar chart
  const topP = gscPages.slice(0,10);
  const pCtx = document.getElementById('chart-ov-pages')?.getContext('2d');
  if (pCtx && topP.length) overviewCharts.topP = new Chart(pCtx,{
    type:'bar',data:{labels:topP.map(r=>{const u=r.page||'';return u.split('/').filter(Boolean).pop()||u.slice(0,20)}),datasets:[{data:topP.map(r=>r.total_clicks||0),backgroundColor:'rgba(59,130,246,.6)',borderRadius:3}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#64748b',font:{size:9}},grid:{color:'#1e293b'}},y:{ticks:{color:'#94a3b8',font:{size:9}},grid:{display:false}}}}
  });

  // Alert panel
  const alertPanel = document.getElementById('alert-panel');
  if (alertPanel && alerts.length) {
    alertPanel.innerHTML = alerts.filter(a=>!a.acknowledged).slice(0,5).map(a=>`
      <div class="alert-item ${a.severity}" style="padding:.5rem .75rem;font-size:.78rem">
        <span class="alert-icon">${a.severity==='high'?'🔴':a.severity==='medium'?'🟡':'🔵'}</span>
        <div class="alert-body"><div class="alert-title">${a.title}</div></div>
      </div>
    `).join('') || '<div class="empty-state" style="padding:1rem">No active alerts ✅</div>';
  }
}

function renderMovement() {
  const rising   = movementData.filter(r => r.movement > 0).slice(0, 8);
  const dropping = movementData.filter(r => r.movement < 0).slice(0, 8);

  const row = (r, up) => `<div style="display:flex;align-items:center;gap:.5rem;padding:.35rem .75rem;border-bottom:1px solid var(--border);font-size:.8rem">
    <span style="color:${up?'#22c55e':'#ef4444'};font-weight:700;min-width:36px">${up?'+':''}${r.movement.toFixed(1)}</span>
    <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)">${r.query}</span>
    <span style="color:var(--muted);min-width:28px;text-align:right">#${r.position}</span>
  </div>`;

  const rEl = document.getElementById('movement-rising');
  const dEl = document.getElementById('movement-dropping');
  if (rEl) rEl.innerHTML = rising.length  ? rising.map(r=>row(r,true)).join('') : '<div style="padding:1rem;color:var(--muted);font-size:.82rem">No rising keywords yet — need 14+ days of data.</div>';
  if (dEl) dEl.innerHTML = dropping.length? dropping.map(r=>row(r,false)).join(''): '<div style="padding:1rem;color:var(--muted);font-size:.82rem">No drops detected.</div>';
}

let gscDeviceFilter = 'all';
function gscSetFilter(type,value,el) {
  if(type==='device') gscDeviceFilter = value;
  el.parentElement.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  updateSearchConsole();
}

let gscCharts = {};
function updateSearchConsole() {
  Object.values(gscCharts).forEach(c=>{try{c.destroy();}catch(e){}}); gscCharts={};

  const filteredQueries = gscDeviceFilter==='all'?gscQueries:gscQueries.filter(q=>q.device===gscDeviceFilter);

  // Main chart
  const ctx1 = document.getElementById('chart-gsc-main')?.getContext('2d');
  if (ctx1 && gscSiteStats.length) {
    const sorted = gscSiteStats.slice().sort((a,b)=>a.date.localeCompare(b.date));
    const chartType2 = sorted.length <= 3 ? 'bar' : 'line';
    gscCharts.main = new Chart(ctx1,{type:chartType2,data:{labels:sorted.map(d=>d.date),datasets:[
      {label:'Clicks',data:sorted.map(d=>d.total_clicks),borderColor:'#f97316',backgroundColor:'rgba(249,115,22,.6)',fill:true,tension:.3,pointRadius:sorted.length<=3?4:0,borderRadius:4},
      {label:'Impressions',data:sorted.map(d=>d.total_impressions),borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.6)',fill:true,tension:.3,pointRadius:sorted.length<=3?4:0,yAxisID:'y1',borderRadius:4}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#94a3b8',font:{size:11}}}},scales:{x:{ticks:{color:'#64748b',maxTicksLimit:12,font:{size:10}},grid:{color:'#1e293b'}},y:{ticks:{color:'#64748b'},grid:{color:'#1e293b'},beginAtZero:true},y1:{position:'right',ticks:{color:'#3b82f6'},grid:{display:false},beginAtZero:true}},interaction:{intersect:false,mode:'index'}}});
  }

  // Position distribution
  const posBuckets={top3:0,top10:0,top20:0,over20:0};
  filteredQueries.forEach(q=>{const p=q.position||0;if(p<=3)posBuckets.top3++;else if(p<=10)posBuckets.top10++;else if(p<=20)posBuckets.top20++;else posBuckets.over20++;});
  const ctx2=document.getElementById('chart-gsc-positions')?.getContext('2d');
  if(ctx2) gscCharts.pos=new Chart(ctx2,{type:'doughnut',data:{labels:['Pos 1-3','Pos 4-10','Pos 11-20','Pos 21+'],datasets:[{data:[posBuckets.top3,posBuckets.top10,posBuckets.top20,posBuckets.over20],backgroundColor:['#22c55e','#f97316','#f59e0b','#64748b'],borderWidth:0}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',font:{size:10}}}}}});

  // CTR by position
  const ctrBuckets={p1:0,p2_3:0,p4_10:0,p11:0};
  let ctrCount={p1:0,p2_3:0,p4_10:0,p11:0};
  filteredQueries.forEach(q=>{const p=q.position||0;const ctr=q.ctr||0;if(p<=1){ctrBuckets.p1+=ctr;ctrCount.p1++}else if(p<=3){ctrBuckets.p2_3+=ctr;ctrCount.p2_3++}else if(p<=10){ctrBuckets.p4_10+=ctr;ctrCount.p4_10++}else{ctrBuckets.p11+=ctr;ctrCount.p11++}});
  const ctrAvg=['1','2-3','4-10','11+'].map((label,i)=>{const keys=['p1','p2_3','p4_10','p11'];const v=ctrBuckets[keys[i]];const n=ctrCount[keys[i]];return n>0?+(v/n*100).toFixed(1):0;});
  const ctx3=document.getElementById('chart-gsc-ctr')?.getContext('2d');
  if(ctx3) gscCharts.ctr=new Chart(ctx3,{type:'bar',data:{labels:['Pos 1','Pos 2-3','Pos 4-10','Pos 11+'],datasets:[{data:ctrAvg,backgroundColor:['#22c55e','#f97316','#f59e0b','#64748b'],borderRadius:4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#64748b'},grid:{display:false}},y:{ticks:{color:'#64748b',callback:v=>v+'%'},grid:{color:'#1e293b'}}}}});

  // Query table
  const qTbody = document.getElementById('gsc-query-tbody');
  if (qTbody) {
    const mvMap = {};
    movementData.forEach(m => { mvMap[m.query] = m.movement; });
    qTbody.innerHTML = filteredQueries.slice(0,50).map(r => {
      const bench = ctrBenchmark(r.position||0);
      const actualCtr = (r.ctr||0)*100;
      const benchCtr = bench*100;
      const diff = actualCtr - benchCtr;
      const ctrBadge = diff > 0.5
        ? `<span style="color:#22c55e;font-size:.72rem">▲ ${diff.toFixed(1)}%</span>`
        : diff < -0.5
          ? `<span style="color:#ef4444;font-size:.72rem">▼ ${Math.abs(diff).toFixed(1)}%</span>`
          : `<span style="color:var(--muted);font-size:.72rem">≈</span>`;
      const mv = mvMap[r.query||''];
      const mvBadge = mv !== undefined
        ? `<span style="color:${mv>0?'#22c55e':mv<0?'#ef4444':'var(--muted)'};font-size:.75rem">${mv>0?'+':''}${mv.toFixed(1)}</span>`
        : '<span style="color:var(--muted);font-size:.72rem">—</span>';
      return `<tr onclick="window.open('https://www.google.com/search?q=${encodeURIComponent(r.query||'')}','_blank')">
        <td style="color:var(--primary)">${r.query||'--'}</td>
        <td class="num">${(r.clicks||0).toLocaleString()}</td>
        <td class="num">${(r.impressions||0).toLocaleString()}</td>
        <td class="num">${actualCtr.toFixed(1)}% ${ctrBadge}</td>
        <td class="num"><span class="badge ${(r.position||0)<=3?'badge-green':(r.position||0)<=10?'badge-orange':'badge-red'}">${(r.position||0).toFixed(1)}</span></td>
        <td class="num">${mvBadge}</td>
      </tr>`;
    }).join('') || '<tr><td colspan="6" class="empty-state">No GSC data yet.</td></tr>';
  }

  // Page table — click to open drilldown
  const pTbody = document.getElementById('gsc-page-tbody');
  if (pTbody) pTbody.innerHTML = gscPages.slice(0,50).map(r=>{const slug=r.page?r.page.split('/').filter(Boolean).pop()||r.page:r.page;return `<tr onclick="openPageDrilldown(${JSON.stringify(r.page||'').replace(/</g,'&lt;')})"><td style="color:var(--primary);max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${slug||r.page} <span style="color:var(--muted);font-size:.68rem">↗</span></td><td class="num">${(r.total_clicks||0).toLocaleString()}</td><td class="num">${(r.total_impressions||0).toLocaleString()}</td><td class="num">${((r.avg_ctr||0)*100).toFixed(1)}%</td><td class="num"><span class="badge ${(r.avg_position||0)<=3?'badge-green':(r.avg_position||0)<=10?'badge-orange':'badge-red'}">${(r.avg_position||0).toFixed(1)}</span></td></tr>`}).join('')||'<tr><td colspan="5" class="empty-state">No GSC page data yet.</td></tr>';

  // CTR Opportunities, Cannibalization, Country breakdown
  renderCTROpportunities();
  renderCannibalization();
  renderCountryBreakdown();
}

// ── PAGE DRILLDOWN MODAL ──
function openPageDrilldown(pageUrl) {
  const modal = document.createElement('div');
  modal.style = 'position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto';
  const slug = pageUrl.split('/').filter(Boolean).pop() || pageUrl;

  // Queries for this page
  const pageQueries = gscQueries.filter(q => q.page === pageUrl);
  const topQ = [...pageQueries].sort((a,b)=>(b.impressions||0)-(a.impressions||0)).slice(0,10);

  // Trend from site stats per day (approximate from query data grouped by date)
  const dateMap = {};
  pageQueries.forEach(q => {
    if (!q.date) return;
    if (!dateMap[q.date]) dateMap[q.date] = { clicks:0, impressions:0, positions:[] };
    dateMap[q.date].clicks += q.clicks||0;
    dateMap[q.date].impressions += q.impressions||0;
    dateMap[q.date].positions.push(q.position||0);
  });
  const trendDays = Object.keys(dateMap).sort();
  const trendClicks = trendDays.map(d => dateMap[d].clicks);
  const trendImpr   = trendDays.map(d => dateMap[d].impressions);
  const trendPos    = trendDays.map(d => { const ps=dateMap[d].positions; return ps.length?(ps.reduce((a,b)=>a+b,0)/ps.length).toFixed(1):null; });

  const pageData = gscPages.find(p => p.page === pageUrl) || {};
  const totalClicks = pageData.total_clicks || 0;
  const totalImpr   = pageData.total_impressions || 0;
  const avgCTR      = ((pageData.avg_ctr||0)*100).toFixed(1);
  const avgPos      = (pageData.avg_position||0).toFixed(1);

  modal.innerHTML = `
  <div class="card" style="width:780px;max-width:100%;padding:1.5rem;position:relative">
    <button onclick="this.closest('[style*=fixed]').remove()" style="position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem">✕</button>
    <div style="font-size:1rem;font-weight:700;margin-bottom:.25rem;padding-right:2rem">${slug}</div>
    <a href="${pageUrl}" target="_blank" style="font-size:.75rem;color:var(--muted);margin-bottom:1rem;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${pageUrl}</a>

    <div class="kpi-grid" style="margin-bottom:1rem">
      ${[
        {label:'Clicks',value:totalClicks.toLocaleString()},
        {label:'Impressions',value:totalImpr.toLocaleString()},
        {label:'CTR',value:avgCTR+'%'},
        {label:'Avg Position',value:avgPos},
      ].map(k=>`<div class="kpi"><div class="kpi-label">${k.label}</div><div class="kpi-value" style="font-size:1.4rem">${k.value}</div></div>`).join('')}
    </div>

    ${trendDays.length > 1 ? `
    <div class="card" style="margin-bottom:1rem;padding:1rem">
      <div style="font-size:.82rem;font-weight:600;margin-bottom:.5rem;color:var(--muted)">IMPRESSIONS & POSITION TREND</div>
      <div style="position:relative;height:140px"><canvas id="dd-trend-chart"></canvas></div>
    </div>` : ''}

    <div class="card" style="padding:1rem">
      <div style="font-size:.82rem;font-weight:600;margin-bottom:.5rem;color:var(--muted)">TOP QUERIES DRIVING THIS PAGE</div>
      ${topQ.length ? `<table class="data-table" style="font-size:.8rem">
        <thead><tr><th>Query</th><th class="num">Clicks</th><th class="num">Impr</th><th class="num">CTR</th><th class="num">Pos</th></tr></thead>
        <tbody>${topQ.map(q=>`<tr>
          <td style="color:var(--primary)">${q.query||'—'}</td>
          <td class="num">${q.clicks||0}</td>
          <td class="num">${q.impressions||0}</td>
          <td class="num">${((q.ctr||0)*100).toFixed(1)}%</td>
          <td class="num"><span class="badge ${(q.position||0)<=3?'badge-green':(q.position||0)<=10?'badge-orange':'badge-red'}">${(q.position||0).toFixed(1)}</span></td>
        </tr>`).join('')}</tbody>
      </table>` : '<div style="color:var(--muted);font-size:.82rem">No query data for this page.</div>'}
    </div>
  </div>`;
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target===modal) modal.remove(); });

  // Draw trend chart after DOM insert
  if (trendDays.length > 1) {
    requestAnimationFrame(() => {
      const ctx = document.getElementById('dd-trend-chart')?.getContext('2d');
      if (!ctx) return;
      new Chart(ctx, {
        type:'line',
        data: {
          labels: trendDays,
          datasets: [
            { label:'Impressions', data:trendImpr, borderColor:'#3b82f6', fill:false, tension:.3, pointRadius:0, yAxisID:'y' },
            { label:'Position', data:trendPos, borderColor:'#f97316', fill:false, tension:.3, pointRadius:0, yAxisID:'y1', borderDash:[4,3] }
          ]
        },
        options: {
          responsive:true, maintainAspectRatio:false,
          plugins:{legend:{labels:{color:'#94a3b8',font:{size:10}}}},
          scales:{
            x:{ticks:{color:'#64748b',maxTicksLimit:10,font:{size:9}},grid:{color:'#1e293b'}},
            y:{ticks:{color:'#3b82f6',font:{size:9}},grid:{color:'#1e293b'},beginAtZero:true},
            y1:{position:'right',ticks:{color:'#f97316',font:{size:9},callback:v=>'#'+v},grid:{display:false},reverse:true,beginAtZero:false}
          },
          interaction:{intersect:false,mode:'index'}
        }
      });
    });
  }
}

// ── CTR OPPORTUNITY TABLE ──
function renderCTROpportunities() {
  const el = document.getElementById('ctr-opps');
  if (!el) return;
  // Pages with above-avg impressions but below-benchmark CTR
  const opps = gscPages
    .filter(p => (p.total_impressions||0) >= 100)
    .map(p => {
      const bench = ctrBenchmark(p.avg_position||0) * 100;
      const actual = (p.avg_ctr||0) * 100;
      const gap = bench - actual;
      const potentialClicks = Math.round((gap / 100) * (p.total_impressions||0));
      return { ...p, bench, actual, gap, potentialClicks };
    })
    .filter(p => p.gap > 0.5)
    .sort((a,b) => b.potentialClicks - a.potentialClicks)
    .slice(0, 15);

  if (!opps.length) { el.innerHTML = '<div class="empty-state">No CTR gaps found — all pages meet benchmark!</div>'; return; }
  el.innerHTML = `<table class="data-table"><thead><tr>
    <th>Page</th><th class="num">Pos</th><th class="num">CTR</th><th class="num">Benchmark</th><th class="num">Gap</th><th class="num">~Clicks Lost/Period</th>

// ── CANNIBALIZATION DETECTOR ──
function renderCannibalization() {
  const el = document.getElementById('cannibal-list');
  if (!el) return;
  // Find queries where 2+ different pages appear
  const queryPages = {};
  gscQueries.forEach(q => {
    if (!q.query || !q.page) return;
    if (!queryPages[q.query]) queryPages[q.query] = {};
    if (!queryPages[q.query][q.page]) queryPages[q.query][q.page] = { clicks:0, impressions:0, positions:[] };
    queryPages[q.query][q.page].clicks += q.clicks||0;
    queryPages[q.query][q.page].impressions += q.impressions||0;
    queryPages[q.query][q.page].positions.push(q.position||0);
  });

  const conflicts = Object.entries(queryPages)
    .filter(([,pages]) => Object.keys(pages).length >= 2)
    .map(([query, pages]) => {
      const pageList = Object.entries(pages).map(([url, d]) => ({
        url, clicks: d.clicks, impressions: d.impressions,
        pos: d.positions.length ? (d.positions.reduce((a,b)=>a+b,0)/d.positions.length).toFixed(1) : '—'
      })).sort((a,b) => b.impressions - a.impressions);
      return { query, pages: pageList, totalImpr: pageList.reduce((s,p)=>s+p.impressions,0) };
    })
    .filter(c => c.totalImpr >= 20)
    .sort((a,b) => b.totalImpr - a.totalImpr)
    .slice(0, 20);

  if (!conflicts.length) { el.innerHTML = '<div class="empty-state">No cannibalization detected 🎉</div>'; return; }
  el.innerHTML = conflicts.map(c => `
    <div style="padding:.75rem;border-bottom:1px solid var(--border)">
      <div style="font-size:.85rem;font-weight:600;color:var(--primary);margin-bottom:.4rem">"${c.query}" <span style="color:var(--muted);font-weight:400;font-size:.72rem">${c.totalImpr} impressions</span></div>
      ${c.pages.map(p => {
        const slug = p.url.split('/').filter(Boolean).pop() || p.url;
        return `<div style="display:flex;gap:.75rem;align-items:center;font-size:.78rem;color:var(--muted);padding:.15rem 0;margin-left:.75rem">
          <span style="color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${slug}</span>
          <span>pos ${p.pos}</span><span>${p.impressions} impr</span><span>${p.clicks} clicks</span>
        </div>`;
      }).join('')}
    </div>`).join('');
}

// ── COUNTRY / LANGUAGE BREAKDOWN ──
function renderCountryBreakdown() {
  const el = document.getElementById('country-breakdown');
  if (!el) return;

  // Group queries by country
  const countryMap = {};
  gscQueries.forEach(q => {
    const c = q.country || 'unknown';
    if (!countryMap[c]) countryMap[c] = { clicks:0, impressions:0, queries:new Set() };
    countryMap[c].clicks += q.clicks||0;
    countryMap[c].impressions += q.impressions||0;
    countryMap[c].queries.add(q.query);
  });

  const countries = Object.entries(countryMap)
    .map(([c, d]) => ({ country: c, ...d, queries: d.queries.size }))
    .sort((a,b) => b.clicks - a.clicks)
    .slice(0, 15);

  if (!countries.length) { el.innerHTML = '<div class="empty-state">No country data yet — needs GSC data with country dimension.</div>'; return; }

  const countryFlag = c => ({ usa:'🇺🇸',gbr:'🇬🇧',can:'🇨🇦',aus:'🇦🇺',fra:'🇫🇷',deu:'🇩🇪',esp:'🇪🇸',ita:'🇮🇹',bra:'🇧🇷',por:'🇵🇹',mex:'🇲🇽',arg:'🇦🇷',col:'🇨🇴',nld:'🇳🇱',che:'🇨🇭',bel:'🇧🇪',aut:'🇦🇹',ind:'🇮🇳',jpn:'🇯🇵',kor:'🇰🇷' }[c?.toLowerCase()] || '🌐');
  const maxClicks = countries[0]?.clicks || 1;

  el.innerHTML = countries.map(c => `
    <div style="display:flex;align-items:center;gap:.75rem;padding:.45rem 0;border-bottom:1px solid var(--border)">
      <span style="font-size:1.1rem;width:24px">${countryFlag(c.country)}</span>
      <span style="font-size:.82rem;color:var(--text);width:80px;text-transform:uppercase">${c.country}</span>
      <div style="flex:1;background:var(--bg);border-radius:4px;height:6px;overflow:hidden">
        <div style="height:100%;background:var(--primary);border-radius:4px;width:${Math.round(c.clicks/maxClicks*100)}%"></div>
      </div>
      <span style="font-size:.78rem;color:var(--text);font-variant-numeric:tabular-nums;width:60px;text-align:right">${c.clicks.toLocaleString()} clicks</span>
      <span style="font-size:.72rem;color:var(--muted);width:70px;text-align:right">${c.impressions.toLocaleString()} impr</span>
    </div>`).join('');
}

let contentCharts={};
function updateContent(events) {
  Object.values(contentCharts).forEach(c=>{try{c.destroy();}catch(e){}}); contentCharts={};

  const calcStats={};
  events.forEach(e=>{const slug=e.calc_slug||'unknown';if(!calcStats[slug])calcStats[slug]={slug,id:e.calc_id||'',views:0,calcs:0,copies:0,shares:0,times:[],sessions:new Set(),sessionEvents:{}};const s=calcStats[slug];if(e.session_id){s.sessions.add(e.session_id);if(!s.sessionEvents[e.session_id])s.sessionEvents[e.session_id]=[];s.sessionEvents[e.session_id].push(e.event_name);}if(e.event_name==='page_view')s.views++;if(e.event_name==='calculation_completed')s.calcs++;if(e.event_name==='copy_results')s.copies++;if(e.event_name==='share_clicked')s.shares++;if(e.seconds)s.times.push(e.seconds);});

  const pageMap={};
  gscPages.forEach(p=>{const slug=p.page?p.page.split('/').filter(Boolean).pop()||p.page:p.page;if(!pageMap[slug])pageMap[slug]={clicks:0,impr:0,pos:0};pageMap[slug].clicks+=p.total_clicks||0;pageMap[slug].impr+=p.total_impressions||0;pageMap[slug].pos=Math.max(pageMap[slug].pos,p.avg_position||0);});

  const rows=Object.values(calcStats).sort((a,b)=>b.views-a.views).map(c=>{
    const conv=c.views>0?((c.calcs/c.views)*100).toFixed(1):'0';
    const avgTime=c.times.length>0?Math.round(c.times.reduce((s,v)=>s+v,0)/c.times.length):0;
    let bounced=0;Object.values(c.sessionEvents).forEach(evts=>{if(!evts.some(en=>en==='calculation_completed'||en==='copy_results'||en==='share_clicked'||en==='scroll_depth'))bounced++;});
    const bounceRate=c.sessions.size>0?((bounced/c.sessions.size)*100).toFixed(1):'0';
    const gsc=pageMap[c.slug]||{clicks:0,impr:0,pos:0};
    return `<tr><td style="color:var(--primary)">${c.slug}</td><td class="num">${c.views.toLocaleString()}</td><td class="num">${c.calcs.toLocaleString()}</td><td class="num">${conv}%</td><td class="num">${bounceRate}%</td><td class="num">${avgTime}s</td><td class="num">${gsc.clicks}</td><td class="num">${gsc.impr}</td><td class="num"><span class="badge ${gsc.pos<=10?'badge-green':gsc.pos<=20?'badge-orange':'badge-red'}">${gsc.pos||'--'}</span></td></tr>`;
  }).join('');

  const tbody=document.getElementById('content-calc-tbody');
  if(tbody) tbody.innerHTML=rows||'<tr><td colspan="9" class="empty-state">No data for this period</td></tr>';

  // Language chart
  const langStats={};
  events.forEach(e=>{const lang=(e.language||'unknown').split('-')[0].toLowerCase();if(lang.length>2)return;if(!langStats[lang])langStats[lang]={views:0,calcs:0};if(e.event_name==='page_view')langStats[lang].views++;if(e.event_name==='calculation_completed')langStats[lang].calcs++;});
  const langCtx=document.getElementById('chart-content-lang')?.getContext('2d');
  if(langCtx){const sorted=Object.entries(langStats).sort((a,b)=>b[1].views-a[1].views);contentCharts.lang=new Chart(langCtx,{type:'bar',data:{labels:sorted.map(e=>e[0].toUpperCase()),datasets:[{label:'Views',data:sorted.map(e=>e[1].views),backgroundColor:'rgba(249,115,22,.6)',borderRadius:4},{label:'Calcs',data:sorted.map(e=>e[1].calcs),backgroundColor:'rgba(34,197,94,.6)',borderRadius:4}]},options:{responsive:true,plugins:{legend:{labels:{color:'#94a3b8',font:{size:10}}}},scales:{x:{ticks:{color:'#64748b'},grid:{display:false}},y:{ticks:{color:'#64748b'},grid:{color:'#1e293b'}}}}});}

  // Category chart (from calc_slug block extraction)
  const catStats={};
  events.forEach(e=>{const parts=(e.calc_slug||'').split('/');const block=parts[0]||'unknown';if(!catStats[block])catStats[block]={views:0,calcs:0};if(e.event_name==='page_view')catStats[block].views++;if(e.event_name==='calculation_completed')catStats[block].calcs++;});
  const catCtx=document.getElementById('chart-content-cats')?.getContext('2d');
  if(catCtx){const sorted=Object.entries(catStats).sort((a,b)=>b[1].views-a[1].views);contentCharts.cat=new Chart(catCtx,{type:'bar',data:{labels:sorted.map(e=>e[0]),datasets:[{data:sorted.map(e=>e[1].views),backgroundColor:sorted.map((_,i)=>['#f97316','#3b82f6','#22c55e','#f59e0b','#8b5cf6','#ec4899'][i%6]),borderRadius:4}]},options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#64748b'},grid:{color:'#1e293b'}},y:{ticks:{color:'#94a3b8',font:{size:9}},grid:{display:false}}}}});}

  // Language × Calculator heatmap
  const heatmapEl = document.getElementById('lang-heatmap');
  if (heatmapEl) {
    const langs = ['en','fr','de','it','pt','es'];
    const calcViews = {};
    events.forEach(e => {
      if (e.event_name !== 'page_view') return;
      const slug = e.calc_slug || '';
      const lang = (e.language||'').split('-')[0].toLowerCase();
      if (!langs.includes(lang) || !slug) return;
      if (!calcViews[slug]) calcViews[slug] = {};
      calcViews[slug][lang] = (calcViews[slug][lang]||0) + 1;
    });
    const topCalcs = Object.entries(calcViews)
      .map(([slug, lv]) => ({ slug, total: Object.values(lv).reduce((a,b)=>a+b,0), lv }))
      .sort((a,b) => b.total - a.total).slice(0, 20);

    if (topCalcs.length === 0) {
      heatmapEl.innerHTML = '<div style="color:var(--muted);font-size:.82rem;padding:.5rem">No analytics data yet.</div>';
    } else {
      const maxVal = Math.max(...topCalcs.flatMap(c => langs.map(l => c.lv[l]||0)));
      const cell = (v) => {
        const pct = maxVal > 0 ? v / maxVal : 0;
        const bg = v === 0 ? '#0f172a' : `rgba(249,115,22,${0.15 + pct * 0.85})`;
        const color = pct > 0.5 ? '#fff' : '#94a3b8';
        return `<td style="text-align:center;padding:4px 6px;background:${bg};color:${color};font-size:.72rem;min-width:44px;border:1px solid #1e293b">${v||''}</td>`;
      };
      heatmapEl.innerHTML = `<table style="border-collapse:collapse;font-size:.78rem">
        <thead><tr>
          <th style="padding:4px 8px;text-align:left;color:var(--muted);font-weight:500;min-width:140px">Calculator</th>
          ${langs.map(l=>`<th style="padding:4px 6px;text-align:center;color:var(--muted);font-weight:500">${l.toUpperCase()}</th>`).join('')}
          <th style="padding:4px 6px;text-align:center;color:var(--muted);font-weight:500">Total</th>
        </tr></thead>
        <tbody>${topCalcs.map(c=>`<tr>
          <td style="padding:4px 8px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px">${c.slug}</td>
          ${langs.map(l=>cell(c.lv[l]||0)).join('')}
          <td style="text-align:center;padding:4px 6px;font-weight:600;color:var(--primary);font-size:.72rem">${c.total}</td>
        </tr>`).join('')}</tbody>
      </table>`;
    }
  }
}

let trafficCharts={};
function updateTraffic(events){
  Object.values(trafficCharts).forEach(c=>{try{c.destroy();}catch(e){}}); trafficCharts={};
  const users=new Map();
  events.forEach(e=>{const uid=e.user_id||'anon';if(!users.has(uid))users.set(uid,{events:0,sessions:new Set()});const u=users.get(uid);u.events++;if(e.session_id)u.sessions.add(e.session_id);});
  const total=users.size,returning=[...users.values()].filter(u=>u.sessions.size>1).length,newUsers=total-returning;
  const totalSessions=[...users.values()].reduce((s,u)=>s+u.sessions.size,0);
  document.getElementById('kpi-users').innerHTML=`<div class="kpi-label">Total Users</div><div class="kpi-value">${total}</div><div class="kpi-sub">${newUsers} new</div>`;
  document.getElementById('kpi-sessions').innerHTML=`<div class="kpi-label">Total Sessions</div><div class="kpi-value">${totalSessions}</div><div class="kpi-sub">${returning} returning</div>`;
  document.getElementById('kpi-avg-events').innerHTML=`<div class="kpi-label">Avg Events/Session</div><div class="kpi-value">${totalSessions>0?Math.round(events.length/totalSessions):0}</div>`;

  // Devices
  const devices={desktop:0,mobile:0,tablet:0};
  events.forEach(e=>{const w=e.screen_width||0;if(w>=1024)devices.desktop++;else if(w>=600)devices.tablet++;else if(w>0)devices.mobile++;});
  const dCtx=document.getElementById('chart-traf-devices')?.getContext('2d');
  if(dCtx)trafficCharts.devices=new Chart(dCtx,{type:'doughnut',data:{labels:['Desktop','Mobile','Tablet'],datasets:[{data:[devices.desktop,devices.mobile,devices.tablet],backgroundColor:['#f97316','#3b82f6','#22c55e'],borderWidth:0}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',font:{size:11}}}}}});

  // Browsers
  const browsers={};
  events.forEach(e=>{const ua=(e.user_agent||'').toLowerCase();let b='Other';if(ua.includes('chrome')&&!ua.includes('edg'))b='Chrome';else if(ua.includes('firefox'))b='Firefox';else if(ua.includes('safari')&&!ua.includes('chrome'))b='Safari';else if(ua.includes('edg'))b='Edge';browsers[b]=(browsers[b]||0)+1;});
  const bCtx=document.getElementById('chart-traf-browsers')?.getContext('2d');
  if(bCtx){const sorted=Object.entries(browsers).sort((a,b)=>b[1]-a[1]);trafficCharts.browsers=new Chart(bCtx,{type:'pie',data:{labels:sorted.map(e=>e[0]),datasets:[{data:sorted.map(e=>e[1]),backgroundColor:['#f97316','#3b82f6','#22c55e','#f59e0b','#8b5cf6'],borderWidth:0}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',font:{size:11}}}}}});}

  // Hourly
  const hourBins=Array(24).fill(0);
  events.forEach(e=>{if(!e.event_time)return;const h=new Date(e.event_time.seconds*1000).getHours();hourBins[h]++;});
  const hCtx=document.getElementById('chart-traf-hourly')?.getContext('2d');
  if(hCtx)trafficCharts.hourly=new Chart(hCtx,{type:'bar',data:{labels:Array.from({length:24},(_,i)=>`${i}:00`),datasets:[{data:hourBins,backgroundColor:hourBins.map((v,i)=>i>=6&&i<18?'rgba(249,115,22,.6)':'rgba(59,130,246,.5)'),borderRadius:4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#64748b',maxTicksLimit:12,font:{size:9}},grid:{display:false}},y:{ticks:{color:'#64748b'},grid:{color:'#1e293b'}}}}});
}

let convCharts={};
function updateConversions(events){
  Object.values(convCharts).forEach(c=>{try{c.destroy();}catch(e){}}); convCharts={};

  const pv=events.filter(e=>e.event_name==='page_view').length;
  const calcs=events.filter(e=>e.event_name==='calculation_completed').length;
  const copies=events.filter(e=>e.event_name==='copy_results').length;
  const shares=events.filter(e=>e.event_name==='share_clicked').length;
  const maxW=Math.max(pv,1);

  document.getElementById('funnel-viz').innerHTML = [
    {label:'Page Views',val:pv,color:'#f97316'},
    {label:'Calculations',val:calcs,color:'#3b82f6'},
    {label:'Copies',val:copies,color:'#22c55e'},
    {label:'Shares',val:shares,color:'#8b5cf6'},
  ].map((s,i)=>{const pct=((s.val/maxW)*100).toFixed(1);const prev=Math.max(pv,i>0?[pv,calcs,copies,shares][i-1]:pv,1);const drop=i>0?((1-s.val/prev)*100).toFixed(1):'0';
    return `<div class="funnel-bar"><span class="funnel-label">${s.label}</span><div class="funnel-fill" style="background:${s.color};width:${pct}%"></div><span class="funnel-count">${s.val.toLocaleString()}</span>${i>0?`<span class="funnel-drop">${drop}% drop</span>`:''}</div>`;
  }).join('');

  // Time to calc
  const calcTimes=events.filter(e=>e.event_name==='calculation_completed'&&e.time_to_calculate!==null).map(e=>e.time_to_calculate/60).filter(t=>t>=0&&t<=30);
  const bins=[0,0.5,1,2,3,5,10,30];const timeLabels=['<30s','30s-1m','1-2m','2-3m','3-5m','5-10m','10-30m'];
  const timeCounts=Array(bins.length-1).fill(0);
  calcTimes.forEach(t=>{for(let i=bins.length-2;i>=0;i--){if(t>=bins[i]&&t<bins[i+1]){timeCounts[i]++;break;}}});
  const tCtx=document.getElementById('chart-conv-time')?.getContext('2d');
  if(tCtx)convCharts.time=new Chart(tCtx,{type:'bar',data:{labels:timeLabels,datasets:[{data:timeCounts,backgroundColor:'rgba(249,115,22,.6)',borderRadius:4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#64748b',font:{size:9}},grid:{display:false}},y:{ticks:{color:'#64748b'},grid:{color:'#1e293b'}}}}});

  // Calcs per session
  const sessCalcs={};
  events.forEach(e=>{if(e.event_name==='calculation_completed'&&e.session_id){sessCalcs[e.session_id]=(sessCalcs[e.session_id]||0)+1;}});
  const calcsDist={1:0,2:0,3:0,5:0,10:0,more:0};

function renderIndexCoverageData(sitemaps, fetchedDate) {
  const panel = document.getElementById('index-coverage-panel');
  if (!panel) return;
  if (!sitemaps || !sitemaps.length) {
    panel.innerHTML = `<div style="padding:1rem;color:var(--muted);font-size:.82rem">
      No sitemap data yet. Click <strong>Refresh</strong> to fetch from Google Search Console.
    </div>`;
    return;
  }
  let totalSubmitted = 0, totalIndexed = 0;
  sitemaps.forEach(s => (s.contents||[]).forEach(c => { totalSubmitted += c.submitted||0; totalIndexed += c.indexed||0; }));
  const pct = totalSubmitted > 0 ? ((totalIndexed/totalSubmitted)*100).toFixed(0) : 0;
  const color = parseInt(pct) >= 90 ? '#22c55e' : parseInt(pct) >= 70 ? '#f59e0b' : '#ef4444';
  const ago = fetchedDate ? `as of ${fetchedDate}` : '';
  panel.innerHTML = [
    {label:'Pages Submitted',value:totalSubmitted.toLocaleString(),sub:'in sitemaps'},
    {label:'Pages Indexed',value:totalIndexed.toLocaleString(),sub:'by Google'},
    {label:'Index Rate',value:`${pct}%`,sub:parseInt(pct)>=90?'Excellent':parseInt(pct)>=70?'Needs work':'Critical',color},
    {label:'Sitemaps',value:sitemaps.length,sub:ago},
  ].map(k=>`<div class="kpi"${k.color?` style="--kpi-bar:${k.color}"`:''}><div class="kpi-label">${k.label}</div><div class="kpi-value"${k.color?` style="color:${k.color}"`:''}>${k.value}</div><div class="kpi-sub">${k.sub}</div></div>`).join('');
}

async function loadIndexCoveragePanel() {
  const panel = document.getElementById('index-coverage-panel');
  if (!panel) return;
  panel.innerHTML = '<div class="loading" style="padding:.5rem"><span class="spinner"></span> Loading…</div>';
  try {
    // Read most recent stored doc from Firestore
    const snap = await db.collection('gsc_index_coverage').orderBy('date','desc').limit(1).get();
    if (!snap.empty) {
      const d = snap.docs[0].data();
      renderIndexCoverageData(d.sitemaps || [], d.date);
    } else {
      // No data stored yet — try fetching live
      await refreshIndexCoverage();
    }
  } catch(e) {
    if (panel) panel.innerHTML = `<div style="padding:1rem;color:var(--muted);font-size:.82rem">No index data yet. Click Refresh to fetch.</div>`;
  }
}

async function refreshIndexCoverage() {
  const panel = document.getElementById('index-coverage-panel');
  if (!panel) return;
  panel.innerHTML = '<div class="loading" style="padding:.5rem"><span class="spinner"></span> Fetching from GSC…</div>';
  try {
    const res = await fetch(`${BASE}/getIndexCoverage`).then(r=>r.json()).catch(()=>null);
    if (res && Array.isArray(res)) {
      renderIndexCoverageData(res, new Date().toISOString().slice(0,10));
    } else {
      // Fall back to whatever is in Firestore
      const snap = await db.collection('gsc_index_coverage').orderBy('date','desc').limit(1).get();
      if (!snap.empty) {
        const d = snap.docs[0].data();
        renderIndexCoverageData(d.sitemaps || [], d.date);

// ── TAB 7: OPPORTUNITIES ──
function computeOpportunities(events) {
  const ops = [];

  // CTR benchmarks by position (industry averages)
  const ctrBenchmark = pos => {
    const p = Math.round(pos);
    const map = {1:0.28,2:0.15,3:0.11,4:0.08,5:0.07,6:0.05,7:0.04,8:0.035,9:0.03,10:0.025};
    if (p <= 10) return map[p] || 0.025;
    if (p <= 20) return 0.01;
    return 0.005;
  };

  // ── 1. CTR QUICK WINS ──
  // Queries ranking 4-20 with enough impressions where actual CTR < expected
  gscQueries
    .filter(q => q.position >= 3.5 && q.position <= 20 && (q.impressions || 0) >= 10)
    .forEach(q => {
      const expected = ctrBenchmark(q.position);
      const actual = q.ctr || 0;
      const potentialClicks = Math.round((q.impressions || 0) * Math.max(0, expected - actual));
      if (potentialClicks < 1) return;
      ops.push({
        type: 'ctr',
        priority: potentialClicks > 40 ? 'high' : potentialClicks > 15 ? 'medium' : 'low',
        score: potentialClicks * 10,
        title: `Lift CTR for "${q.query}"`,
        why: `Ranks #${(q.position||0).toFixed(1)} with ${(q.impressions||0).toLocaleString()} impressions but only ${((q.ctr||0)*100).toFixed(1)}% CTR — expected ~${(expected*100).toFixed(0)}% at this position.`,
        what: 'Rewrite the page title and meta description to be more specific and compelling. Add the exact query phrase. Use numbers or "free" if applicable.',
        impact: `+${potentialClicks} clicks possible per period`,
        cta: 'View in GSC',
        href: 'https://search.google.com/search-console/performance/search-analytics?resource_id=sc-domain:calcto.work',
      });
    });

  // ── 2. CONTENT GAPS ──
  // High-impression queries where we rank poorly (pos > 20) — opportunity to create/improve content
  const existingPageSlugs = new Set(gscPages.map(p => {
    const parts = (p.page || '').split('/').filter(Boolean);
    return parts[parts.length - 1] || '';
  }));
  gscQueries
    .filter(q => (q.position || 0) > 20 && (q.impressions || 0) >= 15)
    .sort((a, b) => (b.impressions || 0) - (a.impressions || 0))
    .slice(0, 8)
    .forEach(q => {
      ops.push({
        type: 'gap',
        priority: (q.impressions || 0) > 500 ? 'high' : (q.impressions || 0) > 200 ? 'medium' : 'low',
        score: (q.impressions || 0) * 2,
        title: `Content gap: "${q.query}"`,
        why: `${(q.impressions||0).toLocaleString()} people searched this but you rank #${Math.round(q.position||0)} — too deep to get any clicks.`,
        what: 'Either create a new calculator that directly answers this query, or add an FAQ/explanation section on the closest existing page targeting this keyword.',
        impact: `${(q.impressions||0).toLocaleString()} impressions available`,
        cta: 'Search Google',
        href: `https://www.google.com/search?q=${encodeURIComponent(q.query||'')}`,
      });
    });

  // ── 3. POSITION NEAR PAGE-1 ──
  // Queries on position 11-15 that are one push from page 1
  gscQueries
    .filter(q => (q.position||0) >= 10.5 && (q.position||0) <= 15 && (q.impressions||0) >= 20)
    .sort((a, b) => (b.impressions||0) - (a.impressions||0))
    .slice(0, 5)
    .forEach(q => {
      const extraClicks = Math.round((q.impressions||0) * (0.025 - (q.ctr||0)));
      ops.push({
        type: 'rank',
        priority: (q.impressions||0) > 300 ? 'high' : 'medium',
        score: (q.impressions||0) * 5,
        title: `One push from page 1: "${q.query}"`,
        why: `Ranks #${(q.position||0).toFixed(1)} — just outside page 1. ${(q.impressions||0).toLocaleString()} impressions going mostly to competitors.`,
        what: 'Add internal links from your homepage or high-traffic calculators to this page. Expand content with a step-by-step explanation and FAQ. Build 2-3 backlinks.',
        impact: `Reaching pos 1-10 could unlock ${(q.impressions||0).toLocaleString()} impressions`,
        cta: 'View in GSC',
        href: 'https://search.google.com/search-console/performance/search-analytics?resource_id=sc-domain:calcto.work',
      });
    });

  // ── 4. UX FIXES from analytics ──
  const calcStats = {};
  events.forEach(e => {
    const slug = e.calc_slug || 'unknown';
    if (!calcStats[slug]) calcStats[slug] = { views:0, calcs:0, sessions:new Set(), sessionEvents:{} };
    const s = calcStats[slug];
    if (e.session_id) {
      s.sessions.add(e.session_id);
      if (!s.sessionEvents[e.session_id]) s.sessionEvents[e.session_id] = [];
      s.sessionEvents[e.session_id].push(e.event_name);
    }
    if (e.event_name === 'page_view') s.views++;
    if (e.event_name === 'calculation_completed') s.calcs++;
  });

  Object.entries(calcStats)
    .filter(([, s]) => s.views >= 5)
    .forEach(([slug, s]) => {
      let bounced = 0;
      Object.values(s.sessionEvents).forEach(evts => {
        if (!evts.some(en => ['calculation_completed','copy_results','scroll_depth','input_changed'].includes(en))) bounced++;
      });
      const bounceRate = s.sessions.size > 0 ? bounced / s.sessions.size : 0;
      const convRate = s.views > 0 ? s.calcs / s.views : 0;
      if (bounceRate > 0.65 && s.sessions.size >= 3) {
        ops.push({
          type: 'ux',
          priority: bounceRate > 0.85 ? 'high' : 'medium',
          score: s.views * bounceRate * 3,
          title: `High bounce on "${slug}"`,
          why: `${(bounceRate*100).toFixed(0)}% of ${s.sessions.size} sessions leave without interacting. Only ${(convRate*100).toFixed(1)}% complete a calculation.`,
          what: 'Make the calculator inputs visible without scrolling. Add a clear headline explaining what it calculates. Check mobile layout — most bounces are mobile users who can\'t find the inputs.',
          impact: `${s.views} views, ${Math.round(bounceRate * s.sessions.size)} wasted sessions`,
          cta: 'Open page',
          href: `https://calcto.work/${slug}/`,
        });
      }
    });

  // ── 5. ZERO-CLICK PAGES ──
  // Pages with impressions but 0 clicks in GSC
  gscPages
    .filter(p => (p.total_impressions||0) > 30 && (p.total_clicks||0) === 0)
    .slice(0, 4)
    .forEach(p => {
      const slug = (p.page||'').split('/').filter(Boolean).pop() || p.page;
      ops.push({
        type: 'ctr',
        priority: (p.total_impressions||0) > 1000 ? 'high' : 'medium',
        score: (p.total_impressions||0),
        title: `Zero clicks despite impressions: "${slug}"`,
        why: `${(p.total_impressions||0).toLocaleString()} impressions, 0 clicks. Avg position ${(p.avg_position||0).toFixed(1)}. The title/description is not compelling enough.`,
        what: 'Completely rewrite the meta title to include the main keyword at the start. Meta description should include a number or concrete benefit. Check if SERP shows rich snippets for competitors.',
        impact: `Even 1% CTR = ${Math.round((p.total_impressions||0) * 0.01)} clicks`,
        cta: 'Open page',
        href: p.page || '#',
      });
    });

  return ops.sort((a, b) => {
    const po = {high:0, medium:1, low:2};
    return (po[a.priority]||1) - (po[b.priority]||1) || b.score - a.score;
  });
}

// ── TAB: ROADMAP ──
function renderRoadmap(area) {
  area.innerHTML = `<div id="roadmap-tab">
    <div class="card">
      <div class="card-header">
        <span class="card-title">🗺️ Content Roadmap</span>
        <span style="font-size:.78rem;color:var(--muted)">Content gaps from GSC — queries ranking >20 with impressions. Status saved locally.</span>
      </div>
      <div id="roadmap-body"><div class="loading"><span class="spinner"></span> Analyzing content gaps…</div></div>
    </div>
  </div>`;

  const statusColors = { 'todo':'var(--muted)', 'inprogress':'var(--warning)', 'done':'var(--success)' };
  const statusLabels = { 'todo':'To Build', 'inprogress':'In Progress', 'done':'Done' };

  loadGscData(90).then(() => {
    // Find queries with position > 20 and enough impressions (content gaps)
    const queryMap = {};
    gscQueries.forEach(row => {
      const q = row.query;
      if (!q) return;
      if (!queryMap[q]) queryMap[q] = { impressions:0, clicks:0, positions:[] };
      queryMap[q].impressions += (row.impressions||0);
      queryMap[q].clicks += (row.clicks||0);
      if (row.position) queryMap[q].positions.push(row.position);
    });

    const gaps = Object.entries(queryMap)
      .map(([q, v]) => ({
        query: q,
        impressions: v.impressions,
        clicks: v.clicks,
        position: v.positions.length ? (v.positions.reduce((a,b)=>a+b,0)/v.positions.length).toFixed(1) : 99,
        score: v.impressions * Math.max(0, 50 - (v.positions.length ? v.positions.reduce((a,b)=>a+b,0)/v.positions.length : 99))
      }))
      .filter(g => parseFloat(g.position) > 20 && g.impressions >= 10)
      .sort((a,b) => b.score - a.score)
      .slice(0, 40);

    const statuses = ['todo','inprogress','done'];
    const columns = statuses.map(s => ({
      status: s,
      items: gaps.filter(g => (roadmapStatus[g.query] || 'todo') === s)
    }));
    // items not yet classified go to todo
    gaps.forEach(g => { if (!roadmapStatus[g.query]) roadmapStatus[g.query] = 'todo'; });

    const body = document.getElementById('roadmap-body');
    if (!body) return;

    if (!gaps.length) {
      body.innerHTML = '<div class="empty-state">No content gaps found. Either you rank well for all queries, or GSC data is still loading.</div>';
      return;
    }

    body.innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;align-items:start">
        ${statuses.map(s => `
          <div>
            <div style="font-weight:600;font-size:.8rem;color:${statusColors[s]};text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem;padding:.4rem .6rem;background:rgba(255,255,255,.03);border-radius:6px;display:flex;align-items:center;justify-content:space-between">
              <span>${statusLabels[s]}</span>
              <span style="background:var(--bg);padding:.1rem .45rem;border-radius:10px;font-size:.7rem;color:var(--muted)">${gaps.filter(g=>(roadmapStatus[g.query]||'todo')===s).length}</span>
            </div>
            <div id="col-${s}" style="display:flex;flex-direction:column;gap:.5rem;min-height:60px">
              ${gaps.filter(g=>(roadmapStatus[g.query]||'todo')===s).map(g => `
                <div class="card" style="margin:0;padding:.75rem;border-left:3px solid ${statusColors[s]}">
                  <div style="font-size:.82rem;font-weight:600;color:var(--text);margin-bottom:.3rem;line-height:1.35">${g.query}</div>
                  <div style="font-size:.72rem;color:var(--muted);margin-bottom:.5rem">
                    Pos ~${g.position} · ${g.impressions} impr · ${g.clicks} clicks
                  </div>
                  <div style="display:flex;gap:.3rem;flex-wrap:wrap">
                    ${statuses.filter(ns=>ns!==s).map(ns=>`
                      <button onclick="setRoadmapStatus('${encodeURIComponent(g.query)}','${ns}')"
                        style="font-size:.68rem;padding:.2rem .5rem;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer">
                        → ${statusLabels[ns]}
                      </button>`).join('')}
                  </div>
                </div>`).join('')}
            </div>
          </div>`).join('')}
      </div>`;
  });
}

function setRoadmapStatus(encodedQuery, newStatus) {
  const q = decodeURIComponent(encodedQuery);
  roadmapStatus[q] = newStatus;
  saveRoadmapStatus(roadmapStatus);
  renderRoadmap(document.getElementById('content-area'));
}

async function loadAIConfig() {
  if (aiConfigLoaded) return aiConfig;
  try {
    const res = await fetch(`${CMS_BASE}/getAIConfig`);
    const d = await res.json();
    aiConfig = d;
    aiConfigLoaded = true;
  } catch(e) {}
  return aiConfig;
}

async function saveAIConfig() {
  const active = document.getElementById('ai-active-provider').value;
  const providers = {};
  for (const p of AI_PROVIDERS) {
    const keyEl = document.getElementById(`ai-key-${p.id}`);
    const modelEl = document.getElementById(`ai-model-${p.id}`);
    if (!keyEl) continue;
    const key = keyEl.value.trim();
    const model = modelEl ? modelEl.value : '';
    if (key && !key.includes('••')) providers[p.id] = { api_key: key, model };
    else if (aiConfig.providers && aiConfig.providers[p.id]) {
      // keep existing key (not changed), just update model
      providers[p.id] = { ...aiConfig.providers[p.id], model: model || aiConfig.providers[p.id].model };
      if (key && !key.includes('••')) providers[p.id].api_key = key;
    }
  }
  const btn = document.getElementById('ai-save-btn');
  btn.textContent = '⏳ Saving…'; btn.disabled = true;
  try {
    const res = await fetch(`${CMS_BASE}/saveAIConfig`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ active_provider: active, providers }),
    });
    const d = await res.json();
    if (d.success) { btn.textContent = '✅ Saved'; aiConfigLoaded = false; }
    else throw new Error(d.error);
  } catch(e) { btn.textContent = '❌ Failed: ' + e.message; }
  setTimeout(() => { btn.textContent = 'Save AI Settings'; btn.disabled = false; }, 3000);
}

async function testAIConnection() {
  const btn = document.getElementById('ai-test-btn');
  btn.textContent = '⏳ Testing…'; btn.disabled = true;
  const out = document.getElementById('ai-test-out');
  try {
    const res = await fetch(`${CMS_BASE}/callAI`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: [{ role: 'user', content: 'Reply with exactly: "Connection OK"' }], maxTokens: 20 }),
    });
    const d = await res.json();
    if (d.text) out.innerHTML = `<span style="color:var(--success)">✅ Connected! Provider: ${d.provider}, Model: ${d.model}. Response: "${d.text.trim()}"</span>`;
    else throw new Error(d.error || 'No response');
  } catch(e) { out.innerHTML = `<span style="color:var(--danger)">❌ ${e.message}</span>`; }
  btn.textContent = 'Test Connection'; btn.disabled = false;
}
