<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200" font-family="system-ui,sans-serif">
  <rect width="320" height="200" fill="#f8fafc"/>
  <!-- Slab top face -->
  <polygon points="40,60 280,60 260,40 20,40" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
  <!-- Slab front face -->
  <rect x="40" y="60" width="240" height="90" fill="#cbd5e1" stroke="#64748b" stroke-width="1.5"/>
  <!-- Slab right face -->
  <polygon points="280,60 260,40 260,130 280,150" fill="#94a3b8" stroke="#64748b" stroke-width="1.5"/>
  <!-- Dimension arrows -->
  <!-- Length arrow (top) -->
  <line x1="20" y1="28" x2="260" y2="28" stroke="#f97316" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="140" y="22" text-anchor="middle" font-size="11" fill="#f97316" font-weight="600">Length</text>
  <!-- Width arrow (left side) -->
  <line x1="8" y1="40" x2="8" y2="150" stroke="#f97316" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="8" y="158" text-anchor="middle" font-size="11" fill="#f97316" font-weight="600" transform="rotate(-90,8,100)" dy="0">Width</text>
  <!-- Thickness arrow (right) -->
  <line x1="294" y1="60" x2="294" y2="150" stroke="#2563eb" stroke-width="1.5" marker-start="url(#arr2)" marker-end="url(#arr2)"/>
  <text x="308" y="110" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="600">Thickness</text>
  <!-- Defs -->
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#f97316"/>
    </marker>
    <marker id="arr2" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>
</svg>
