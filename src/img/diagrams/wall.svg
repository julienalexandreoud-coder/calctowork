<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200" font-family="system-ui,sans-serif">
  <rect width="320" height="200" fill="#f8fafc"/>
  <!-- Wall front face -->
  <rect x="50" y="30" width="180" height="130" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
  <!-- Brick pattern -->
  <line x1="50" y1="63" x2="230" y2="63" stroke="#94a3b8" stroke-width="0.8"/>
  <line x1="50" y1="96" x2="230" y2="96" stroke="#94a3b8" stroke-width="0.8"/>
  <line x1="50" y1="129" x2="230" y2="129" stroke="#94a3b8" stroke-width="0.8"/>
  <line x1="140" y1="30" x2="140" y2="63" stroke="#94a3b8" stroke-width="0.8"/>
  <line x1="95" y1="63" x2="95" y2="96" stroke="#94a3b8" stroke-width="0.8"/>
  <line x1="185" y1="63" x2="185" y2="96" stroke="#94a3b8" stroke-width="0.8"/>
  <line x1="140" y1="96" x2="140" y2="129" stroke="#94a3b8" stroke-width="0.8"/>
  <line x1="95" y1="129" x2="95" y2="160" stroke="#94a3b8" stroke-width="0.8"/>
  <line x1="185" y1="129" x2="185" y2="160" stroke="#94a3b8" stroke-width="0.8"/>
  <!-- Wall right depth face -->
  <polygon points="230,30 260,10 260,140 230,160" fill="#cbd5e1" stroke="#64748b" stroke-width="1.5"/>
  <!-- Height arrow (left) -->
  <line x1="32" y1="30" x2="32" y2="160" stroke="#f97316" stroke-width="1.5" marker-start="url(#a1)" marker-end="url(#a1)"/>
  <text x="20" y="100" text-anchor="middle" font-size="11" fill="#f97316" font-weight="600" transform="rotate(-90,20,95)">Height</text>
  <!-- Width arrow (top) -->
  <line x1="50" y1="16" x2="230" y2="16" stroke="#f97316" stroke-width="1.5" marker-start="url(#a1)" marker-end="url(#a1)"/>
  <text x="140" y="11" text-anchor="middle" font-size="11" fill="#f97316" font-weight="600">Width</text>
  <!-- Thickness arrow (right) -->
  <line x1="237" y1="6" x2="262" y2="6" stroke="#2563eb" stroke-width="1.5" marker-start="url(#a2)" marker-end="url(#a2)"/>
  <text x="249" y="3" text-anchor="middle" font-size="10" fill="#2563eb" font-weight="600">Thickness</text>
  <defs>
    <marker id="a1" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#f97316"/>
    </marker>
    <marker id="a2" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>
</svg>
