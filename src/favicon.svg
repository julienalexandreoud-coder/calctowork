<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Orange background -->
  <rect width="100" height="100" rx="14" fill="#f97316"/>

  <!-- Trending chart line (zigzag upward) -->
  <polyline
    points="10,72 28,52 40,62 58,38"
    fill="none" stroke="white" stroke-width="5.5"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arrow (pointing top-right) -->
  <line x1="55" y1="42" x2="82" y2="15" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <polygon points="82,15 68,16 81,29" fill="white"/>

  <!-- Calculator body -->
  <rect x="44" y="48" width="30" height="36" rx="3" fill="white"/>
  <!-- Display -->
  <rect x="47" y="51" width="24" height="8" rx="2" fill="#f97316"/>
  <!-- Keypad dots -->
  <rect x="47" y="62" width="6" height="5" rx="1" fill="#f97316"/>
  <rect x="55" y="62" width="6" height="5" rx="1" fill="#f97316"/>
  <rect x="63" y="62" width="6" height="5" rx="1" fill="#f97316"/>
  <rect x="47" y="69" width="6" height="5" rx="1" fill="#f97316"/>
  <rect x="55" y="69" width="6" height="5" rx="1" fill="#f97316"/>
  <rect x="63" y="69" width="6" height="5" rx="1" fill="#f97316"/>
  <rect x="47" y="76" width="6" height="5" rx="1" fill="#f97316"/>
  <rect x="55" y="76" width="6" height="5" rx="1" fill="#f97316"/>
  <rect x="63" y="76" width="6" height="5" rx="1" fill="#f97316"/>

  <!-- Gear (top of calculator) -->
  <g transform="translate(52,46)">
    <circle cx="0" cy="0" r="7" fill="white"/>
    <circle cx="0" cy="0" r="3.5" fill="#f97316"/>
    <rect x="-2" y="-10" width="4" height="4" rx="1" fill="white" transform="rotate(0)"/>
    <rect x="-2" y="-10" width="4" height="4" rx="1" fill="white" transform="rotate(45)"/>
    <rect x="-2" y="-10" width="4" height="4" rx="1" fill="white" transform="rotate(90)"/>
    <rect x="-2" y="-10" width="4" height="4" rx="1" fill="white" transform="rotate(135)"/>
    <rect x="-2" y="-10" width="4" height="4" rx="1" fill="white" transform="rotate(180)"/>
    <rect x="-2" y="-10" width="4" height="4" rx="1" fill="white" transform="rotate(225)"/>
    <rect x="-2" y="-10" width="4" height="4" rx="1" fill="white" transform="rotate(270)"/>
    <rect x="-2" y="-10" width="4" height="4" rx="1" fill="white" transform="rotate(315)"/>
  </g>
</svg>
